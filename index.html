<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Laporan - Rumah Belajar Al Ihsan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce-short { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -5px); } }
        .animate-slide-up { animation: slide-up 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-bounce-short { animation: bounce-short 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .shimmer-effect {
            background: linear-gradient(120deg, #111827 30%, #10b981 50%, #111827 70%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer-anim 3s linear infinite;
        }
        @keyframes shimmer-anim {
            0% { background-position: -100% center; }
            100% { background-position: 100% center; }
        } 

        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .nav-btn { padding: 10px 20px; border-radius: 14px; color: #94a3b8; transition: all 0.3s; }
        .nav-btn.active { background-color: white; color: #059669; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        #loading { transition: opacity 0.5s ease; opacity: 1; display: flex; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input, textarea { font-size: 16px !important; } 
    </style>
</head>
<body class="pb-24">
    <!-- Loader Screen -->
    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-[200]">
        <div class="flex flex-col items-center">
            <div class="relative w-20 h-20 flex items-center justify-center">
                <div class="absolute inset-0 border-4 border-emerald-50 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                <div class="w-10 h-10 overflow-hidden rounded-xl bg-gray-100 flex items-center justify-center">
                    <img src="https://img.sanishtech.com/u/b4b2625dd6eb1438fbc393468d2ee7bf.png" alt="Logo" class="w-full h-full object-contain">
                </div>
            </div>
            <div class="mt-6 text-center">
                <p class="text-[14px] font-black text-gray-900 uppercase tracking-[0.2em] shimmer-effect">Rumah Belajar Al Ihsan</p>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-[0.3em] mt-2">Gusdurian Mojokerto</p>
            </div>
        </div>
    </div>

    <div id="app"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://dphnwhleycntavygvbfh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwaG53aGxleWNudGF2eWd2YmZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxODQ5NTAsImV4cCI6MjA4ODc2MDk1MH0.ezXfcfR5kKMXyIL0IhRCPBSVf0Gf_Crlco62jxhiU-Q';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        const LOGO_URL = "https://img.sanishtech.com/u/b4b2625dd6eb1438fbc393468d2ee7bf.png";

        // --- Global State ---
        let isAdmin = false;
        let activeTab = 'home'; // home, admin, detail
        let selectedPostId = null;
        let reports = [];
        let comments = [];
        let searchTerm = "";
        let selectedFilePreviews = [];
        let currentSelectedFiles = [];
        let myName = localStorage.getItem('al_ihsan_user_name') || "";
        let isLoadingData = true;

        const fetchData = async () => {
            try {
                const [rResp, cResp] = await Promise.all([
                    supabase.from('reports').select('*').order('createdAt', { ascending: false }),
                    supabase.from('comments').select('*')
                ]);
                reports = rResp.data || [];
                comments = cResp.data || [];
            } catch (err) {
                console.error("Fetch Error:", err);
            } finally {
                isLoadingData = false;
                renderApp();
                hideLoader();
            }
        };

        const hideLoader = () => {
            const loader = document.getElementById('loading');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }
        };

        window.handleFileChange = (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if (files.length === 0 && e.target.files.length > 0) {
                showToast('Pilih file gambar!');
                e.target.value = "";
                return;
            }
            if (files.length > 5) {
                showToast('Maksimal 5 foto!');
                e.target.value = "";
                return;
            }
            currentSelectedFiles = files;
            selectedFilePreviews.forEach(url => URL.revokeObjectURL(url));
            selectedFilePreviews = files.map(file => URL.createObjectURL(file));
            renderApp();
        };

        const processImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (readerEvent) => {
                    const img = new Image();
                    img.onload = () => {
                        try {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 1000;
                            let width = img.width;
                            let height = img.height;
                            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            canvas.toBlob((blob) => {
                                if (blob) resolve(blob);
                                else resolve(file);
                            }, 'image/jpeg', 0.8);
                        } catch (e) { resolve(file); }
                    };
                    img.onerror = () => resolve(file);
                    img.src = readerEvent.target.result;
                };
                reader.onerror = () => resolve(file);
            });
        };

        window.handleUpload = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-upload');
            if (currentSelectedFiles.length === 0) { showToast('Pilih foto dulu!'); return; }
            btn.disabled = true;
            btn.innerHTML = `<span class="flex items-center gap-2 justify-center"><div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Menyiapkan Data...</span>`;
            try {
                const imageUrls = [];
                for (let i = 0; i < currentSelectedFiles.length; i++) {
                    const file = currentSelectedFiles[i];
                    btn.innerHTML = `<span class="flex items-center gap-2 justify-center"><div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Mengirim Foto ${i+1}...</span>`;
                    const finalBlob = await processImage(file);
                    const fileName = `al_ihsan_${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`;
                    const { error: uploadError } = await supabase.storage.from('images').upload(fileName, finalBlob, { contentType: 'image/jpeg' });
                    if (uploadError) throw uploadError;
                    const { data: urlData } = supabase.storage.from('images').getPublicUrl(fileName);
                    if (urlData?.publicUrl) imageUrls.push(urlData.publicUrl);
                }
                const formData = new FormData(e.target);
                const { error: dbError } = await supabase.from('reports').insert([{
                    date: formData.get('date'),
                    tema: formData.get('tema'),
                    description: formData.get('description'),
                    images: imageUrls,
                    likes: 0,
                    createdAt: new Date().toISOString()
                }]);
                if (dbError) throw dbError;
                showToast('Laporan berhasil terbit!');
                currentSelectedFiles = [];
                selectedFilePreviews = [];
                e.target.reset();
                setTimeout(() => { fetchData(); window.setTab('home'); }, 800);
            } catch (err) {
                showToast(`Gagal: ${err.message}`);
                btn.disabled = false;
                btn.innerText = 'Terbitkan Laporan';
            }
        };

        window.viewPost = (id) => {
            selectedPostId = id;
            activeTab = 'detail';
            renderApp();
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.handleLike = async (id) => {
            const report = reports.find(r => r.id === id);
            await supabase.from('reports').update({ likes: (report.likes || 0) + 1 }).eq('id', id);
            fetchData();
        };

        window.handleComment = async (id) => {
            const nInput = document.getElementById(`name-input-${id}`);
            const cInput = document.getElementById(`comment-input-${id}`);
            const name = nInput ? nInput.value.trim() : myName;
            const text = cInput.value.trim();
            if (!name || !text) return;
            if (!myName) { myName = name; localStorage.setItem('al_ihsan_user_name', name); }
            await supabase.from('comments').insert([{ reportId: id, name, text, createdAt: new Date().toISOString() }]);
            fetchData();
        };

        window.handleDelete = async (id) => {
            if (confirm("Hapus laporan ini secara permanen?")) {
                await supabase.from('reports').delete().eq('id', id);
                showToast('Laporan dihapus');
                if (activeTab === 'detail') activeTab = 'home';
                fetchData();
            }
        };

        window.setTab = (tab) => {
            activeTab = tab;
            selectedPostId = null;
            selectedFilePreviews = [];
            currentSelectedFiles = [];
            renderApp();
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.handleSearch = (e) => { searchTerm = e.target.value.toLowerCase(); renderApp(); };
        window.checkAdmin = () => {
            const pass = document.getElementById('admin-pass').value;
            if (pass.toLowerCase() === 'gusdurian') { isAdmin = true; renderApp(); }
            else { showToast('Kode salah!'); }
        };
        window.logoutAdmin = () => { isAdmin = false; activeTab = 'home'; renderApp(); };

        function showToast(msg) {
            const existing = document.querySelector('.toast-notif');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.className = 'toast-notif fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-[10px] font-black uppercase tracking-widest z-[250] animate-bounce-short border border-white/10 shadow-2xl text-center min-w-[220px]';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => { if(t) t.remove(); }, 3000);
        }

        function Navbar() {
            return `
                <nav class="bg-white/80 backdrop-blur-xl border-b border-gray-100 sticky top-0 z-50">
                    <div class="max-w-4xl mx-auto px-6 h-20 flex items-center justify-between">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="window.setTab('home')">
                            <img src="${LOGO_URL}" class="w-9 h-9 object-contain">
                            <div class="flex flex-col">
                                <h1 class="font-black text-gray-900 leading-none text-base tracking-tight shimmer-effect uppercase tracking-tighter">AL IHSAN</h1>
                                <p class="text-[7px] text-emerald-600 font-black uppercase tracking-widest mt-1 leading-none">Rumah Belajar</p>
                            </div>
                        </div>
                        <div class="flex bg-gray-100 p-1.5 rounded-2xl gap-1">
                            <button onclick="window.setTab('home')" class="nav-btn ${activeTab === 'home' ? 'active' : ''}"><i data-lucide="home" class="w-5 h-5"></i></button>
                            <button onclick="window.setTab('admin')" class="nav-btn ${activeTab === 'admin' ? 'active' : ''}"><i data-lucide="plus-circle" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </nav>
            `;
        }

        function ImageSlider(images, isFull = false) {
            if (!images || images.length === 0) return '';
            return `
                <div class="relative w-full mb-5">
                    <div class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar gap-2 pb-1">
                        ${images.map(img => `
                            <div class="flex-none w-full ${isFull ? 'h-auto max-h-[500px]' : 'h-64'} snap-center">
                                <img src="${img}" class="w-full h-full object-cover rounded-[1.8rem] border border-gray-50 shadow-sm" loading="lazy">
                            </div>
                        `).join('')}
                    </div>
                    ${images.length > 1 ? `<div class="absolute bottom-3 left-1/2 -translate-x-1/2 bg-black/40 backdrop-blur-md text-white text-[7px] px-2.5 py-1 rounded-full font-black uppercase tracking-widest pointer-events-none border border-white/10 flex items-center gap-1">Geser Foto <i data-lucide="arrow-right" class="w-2 h-2"></i></div>` : ''}
                </div>
            `;
        }

        function ReportCard(report, index) {
            const rComments = comments.filter(c => c.reportId == report.id);
            const desc = report.description || "";
            const isLong = desc.length > 120;
            
            return `
                <div class="bg-white border border-gray-100 rounded-[2.2rem] p-5 mb-6 shadow-sm animate-slide-up" style="animation-delay: ${index * 80}ms">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[8px] font-black text-emerald-600 uppercase tracking-widest mb-0.5">Laporan Baru</p>
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">${new Date(report.date).toLocaleDateString('id-ID', { dateStyle: 'long' })}</p>
                        </div>
                        ${isAdmin ? `<button onclick="window.handleDelete('${report.id}')" class="text-red-300 hover:text-red-500 p-2"><i data-lucide="trash" class="w-4 h-4"></i></button>` : ''}
                    </div>
                    <div onclick="window.viewPost('${report.id}')" class="cursor-pointer">
                        ${ImageSlider(report.images)}
                        <div class="mb-4">
                            <h3 class="text-base font-black text-gray-900 mb-1.5 leading-tight">${report.tema}</h3>
                            <div class="text-gray-600 text-[12px] leading-relaxed whitespace-pre-wrap font-medium">
                                ${isLong ? desc.substring(0, 120) + '...' : desc}
                                ${isLong ? `<span class="text-emerald-600 font-black ml-1 uppercase text-[10px] tracking-tight">Baca Selengkapnya</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center justify-between border-t border-gray-50 pt-4 mb-4">
                        <button onclick="window.handleLike('${report.id}')" class="flex items-center gap-2 px-3 py-1.5 rounded-xl bg-gray-50 text-gray-500 active:scale-90 transition-all">
                            <i data-lucide="heart" class="w-3.5 h-3.5 ${report.likes > 0 ? 'fill-red-500 text-red-500' : ''}"></i>
                            <span class="text-[10px] font-black">${report.likes || 0}</span>
                        </button>
                        <span onclick="window.viewPost('${report.id}')" class="text-[8px] font-black text-gray-400 uppercase tracking-widest cursor-pointer">${rComments.length} Komentar • Lihat Detail</span>
                    </div>
                </div>
            `;
        }

        function DetailView(report) {
            const rComments = comments.filter(c => c.reportId == report.id);
            return `
                <div class="max-w-xl mx-auto px-4 py-6 animate-slide-up">
                    <button onclick="window.setTab('home')" class="flex items-center gap-2 text-gray-500 mb-6 bg-white px-4 py-2 rounded-xl border border-gray-100 shadow-sm active:scale-95 transition-all">
                        <i data-lucide="chevron-left" class="w-4 h-4"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">Kembali</span>
                    </button>
                    
                    <div class="bg-white rounded-[2.5rem] border border-gray-100 overflow-hidden shadow-sm p-6 mb-6">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="text-[9px] font-black text-emerald-600 uppercase tracking-widest mb-1">Detail Kegiatan</p>
                                <h1 class="text-2xl font-black text-gray-900 leading-tight">${report.tema}</h1>
                                <p class="text-[10px] font-bold text-gray-400 uppercase mt-1 tracking-tight">${new Date(report.date).toLocaleDateString('id-ID', { dateStyle: 'full' })}</p>
                            </div>
                            ${isAdmin ? `<button onclick="window.handleDelete('${report.id}')" class="text-red-500 p-2 bg-red-50 rounded-xl"><i data-lucide="trash" class="w-5 h-5"></i></button>` : ''}
                        </div>

                        ${ImageSlider(report.images, true)}

                        <div class="prose prose-sm max-w-none text-gray-700 text-[14px] leading-[1.8] font-medium whitespace-pre-wrap mb-8">
                            ${report.description}
                        </div>

                        <div class="flex items-center gap-4 border-t border-gray-50 pt-6">
                             <button onclick="window.handleLike('${report.id}')" class="flex items-center gap-2 px-5 py-2.5 rounded-2xl bg-emerald-50 text-emerald-600 active:scale-90 transition-all border border-emerald-100">
                                <i data-lucide="heart" class="w-4 h-4 ${report.likes > 0 ? 'fill-emerald-600' : ''}"></i>
                                <span class="text-[12px] font-black">${report.likes || 0} Suka</span>
                            </button>
                        </div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] border border-gray-100 p-6 shadow-sm">
                        <h3 class="text-sm font-black text-gray-900 mb-6 uppercase tracking-widest border-b border-gray-50 pb-4">${rComments.length} Tanggapan</h3>
                        
                        <div class="space-y-4 mb-8">
                            ${rComments.length ? rComments.map(c => `
                                <div class="bg-gray-50 p-4 rounded-2xl">
                                    <div class="flex justify-between items-center mb-1">
                                        <b class="text-emerald-600 text-[10px] font-black uppercase">${c.name}</b>
                                        <span class="text-[8px] text-gray-400 font-bold">${new Date(c.createdAt).toLocaleDateString('id-ID')}</span>
                                    </div>
                                    <p class="text-gray-600 text-[12px] font-medium leading-relaxed">${c.text}</p>
                                </div>
                            `).join('') : '<p class="text-center text-gray-400 text-[10px] font-bold py-10 uppercase tracking-widest">Belum ada komentar</p>'}
                        </div>

                        <div class="bg-gray-100 rounded-2xl p-4 space-y-3">
                            <p class="text-[8px] font-black text-gray-400 uppercase tracking-widest ml-1">Berikan Tanggapan</p>
                            ${!myName ? `<input type="text" id="name-input-${report.id}" placeholder="Nama Anda" class="w-full bg-white rounded-xl px-4 py-3 text-sm font-bold border-none outline-none focus:ring-2 focus:ring-emerald-500 shadow-sm">` : ''}
                            <div class="flex gap-2">
                                <input type="text" id="comment-input-${report.id}" placeholder="Tulis komentar..." class="flex-1 bg-white rounded-xl px-4 py-3 text-sm font-medium border-none outline-none focus:ring-2 focus:ring-emerald-500 shadow-sm">
                                <button onclick="window.handleComment('${report.id}')" class="bg-gray-900 text-white w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0 active:scale-95 transition-all"><i data-lucide="send" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        const renderApp = () => {
            const container = document.getElementById('app');
            if (!container) return;
            let html = Navbar();

            if (isLoadingData) {
                html += `<div class="py-20 text-center flex flex-col items-center"><div class="w-10 h-10 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div><p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Sinkronisasi Cloud...</p></div>`;
            } else if (activeTab === 'home') {
                const filtered = reports.filter(r => (r.tema + r.description).toLowerCase().includes(searchTerm));
                html += `
                    <div class="max-w-xl mx-auto px-4 py-6">
                        <div class="text-center mb-8">
                            <h2 class="text-2xl font-black mb-4 tracking-tight shimmer-effect leading-tight uppercase tracking-tighter">Mewujudkan Senyum<br>Anak Bangsa</h2>
                            <div class="relative max-w-sm mx-auto">
                                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 w-4 h-4"></i>
                                <input type="text" oninput="window.handleSearch(event)" placeholder="Cari laporan..." class="w-full bg-white border border-gray-100 rounded-2xl py-3 pl-11 pr-4 text-xs shadow-sm outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                        </div>
                        <div class="feed">${filtered.length ? filtered.map((r, i) => ReportCard(r, i)).join('') : '<p class="text-center text-gray-400 text-xs py-10 font-black uppercase tracking-widest animate-pulse">Laporan Tidak Ditemukan</p>'}</div>
                    </div>
                `;
            } else if (activeTab === 'detail') {
                const report = reports.find(r => r.id == selectedPostId);
                if (report) html += DetailView(report);
                else window.setTab('home');
            } else if (activeTab === 'admin') {
                if (!isAdmin) {
                    html += `
                        <div class="max-w-xs mx-auto py-20 px-5">
                            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center border border-gray-100">
                                <h2 class="font-black text-lg mb-6 tracking-tight uppercase tracking-widest text-gray-800">Panel Pengurus</h2>
                                <input type="password" id="admin-pass" placeholder="KODE AKSES" class="w-full bg-gray-50 rounded-xl p-4 text-center text-lg font-black mb-4 outline-none focus:ring-2 focus:ring-emerald-500 tracking-[0.2em]">
                                <button onclick="window.checkAdmin()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg text-[10px] tracking-widest uppercase">Verifikasi</button>
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="max-w-xl mx-auto px-4 py-6">
                            <div class="flex justify-between items-center mb-6">
                                <h2 class="text-xl font-black tracking-tight uppercase text-gray-800">Upload Laporan</h2>
                                <button onclick="window.logoutAdmin()" class="text-red-500 text-[8px] font-black uppercase tracking-widest px-2.5 py-1 bg-red-50 rounded-lg">Keluar</button>
                            </div>
                            <form onsubmit="window.handleUpload(event)" class="bg-white p-6 rounded-[2.2rem] shadow-xl space-y-5 border border-gray-100">
                                <div class="bg-emerald-50/30 p-6 rounded-[1.8rem] border-2 border-dashed border-emerald-100 text-center relative">
                                    <input type="file" id="files" multiple accept="image/*" class="hidden" onchange="window.handleFileChange(event)">
                                    <label for="files" class="cursor-pointer block">
                                        <div class="w-10 h-10 bg-white text-emerald-600 rounded-xl flex items-center justify-center mx-auto mb-2 shadow-sm"><i data-lucide="image-plus" class="w-5 h-5"></i></div>
                                        <p class="text-[10px] font-black text-emerald-800 uppercase tracking-widest">${currentSelectedFiles.length ? currentSelectedFiles.length + ' Foto Terpilih' : 'Pilih Foto Kegiatan'}</p>
                                    </label>
                                </div>
                                ${selectedFilePreviews.length ? `<div class="grid grid-cols-5 gap-2">${selectedFilePreviews.map(p => `<div class="aspect-square rounded-lg overflow-hidden border-2 border-white shadow-sm"><img src="${p}" class="w-full h-full object-cover"></div>`).join('')}</div>` : ''}
                                <div class="space-y-3">
                                    <div class="space-y-1">
                                        <label class="text-[8px] font-black uppercase tracking-widest text-gray-400 ml-2">Tanggal Kegiatan</label>
                                        <input type="date" name="date" required class="w-full bg-gray-50 p-3.5 rounded-xl border-none font-bold text-xs outline-none focus:ring-2 focus:ring-emerald-500">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-[8px] font-black uppercase tracking-widest text-gray-400 ml-2">Tema/Judul</label>
                                        <input type="text" name="tema" placeholder="Nama kegiatan" required class="w-full bg-gray-50 p-3.5 rounded-xl border-none font-bold text-xs outline-none focus:ring-2 focus:ring-emerald-500">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-[8px] font-black uppercase tracking-widest text-gray-400 ml-2">Deskripsi</label>
                                        <textarea name="description" placeholder="Ceritakan detail..." required rows="4" class="w-full bg-gray-50 p-3.5 rounded-xl border-none text-xs font-medium outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
                                    </div>
                                </div>
                                <button type="submit" id="btn-upload" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl shadow-xl hover:bg-emerald-700 uppercase tracking-widest text-[10px]">Terbitkan Laporan</button>
                            </form>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
            lucide.createIcons();
        };

        fetchData();
    </script>
</body>
</html>
