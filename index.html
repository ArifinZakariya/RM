<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Laporan - Rumah Belajar Al Ihsan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        @keyframes slide-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce-short { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -10px); } }
        .animate-slide-up { animation: slide-up 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-bounce-short { animation: bounce-short 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .shimmer-effect {
            background: linear-gradient(120deg, #111827 30%, #10b981 50%, #111827 70%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer-anim 2.5s linear infinite;
        }
        @keyframes shimmer-anim {
            0% { background-position: -100% center; }
            100% { background-position: 100% center; }
        } 

        body { background-color: #fafbfc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .nav-btn { padding: 12px 24px; border-radius: 18px; color: #cbd5e1; transition: all 0.4s; }
        .nav-btn.active { background-color: white; color: #10b981; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.04); }
        #loading { transition: opacity 0.5s ease, visibility 0.5s; }
        
        /* Utility for horizontal scroll without scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input, textarea { font-size: 16px !important; } 
    </style>
</head>
<body class="pb-24">
    <!-- Loading Screen -->
    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-[200]">
        <div class="flex flex-col items-center">
            <div class="relative w-24 h-24 flex items-center justify-center">
                <div class="absolute inset-0 border-4 border-emerald-50 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                <div class="w-12 h-12 overflow-hidden rounded-xl">
                    <img src="https://img.sanishtech.com/u/b4b2625dd6eb1438fbc393468d2ee7bf.png" class="w-full h-full object-contain" onerror="this.src='https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=100&h=100&fit=crop'">
                </div>
            </div>
            <div class="mt-8 text-center">
                <p class="text-[16px] font-black text-gray-900 uppercase tracking-[0.2em] shimmer-effect">Rumah Belajar Al Ihsan</p>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.4em] mt-2 animate-pulse">Gusdurian Mojokerto</p>
            </div>
        </div>
    </div>

    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, query, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global State
        const LOGO_URL = "https://img.sanishtech.com/u/b4b2625dd6eb1438fbc393468d2ee7bf.png";
        let isAdmin = false;
        let activeTab = 'home';
        let reports = [];
        let comments = [];
        let searchTerm = "";
        let selectedFilePreviews = [];
        let currentSelectedFiles = [];
        let myName = localStorage.getItem('al_ihsan_user_name') || "";
        let currentUser = null;
        let isLoadingData = true;

        // Firebase Setup
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // --- Auth Logic ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
                hideLoader();
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                setupListeners();
            }
        });

        const hideLoader = () => {
            const loader = document.getElementById('loading');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    loader.style.visibility = 'hidden';
                }, 500);
            }
        };

        const setupListeners = () => {
            const reportsRef = collection(db, 'artifacts', appId, 'public', 'data', 'reports');
            const commentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'comments');

            onSnapshot(reportsRef, (snapshot) => {
                reports = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                isLoadingData = false;
                renderApp();
                hideLoader();
            }, (error) => {
                console.error("Reports Listener Error:", error);
                isLoadingData = false;
                renderApp();
                hideLoader();
            });

            onSnapshot(commentsRef, (snapshot) => {
                comments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderApp();
            });
            
            setTimeout(hideLoader, 5000);
        };

        // --- Functions ---
        window.setTab = (tab) => {
            activeTab = tab;
            selectedFilePreviews = [];
            currentSelectedFiles = [];
            renderApp();
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.handleSearch = (e) => {
            searchTerm = e.target.value.toLowerCase();
            renderApp();
        };

        window.checkAdmin = () => {
            const pass = document.getElementById('admin-pass').value;
            if (pass === 'gusdurian') {
                isAdmin = true; renderApp();
            } else { showToast('Kode akses salah!'); }
        };

        window.logoutAdmin = () => { isAdmin = false; activeTab = 'home'; renderApp(); };

        window.handleFileChange = (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 5) {
                showToast('Maksimal 5 foto!');
                e.target.value = "";
                return;
            }
            currentSelectedFiles = files;
            selectedFilePreviews = files.map(file => URL.createObjectURL(file));
            renderApp();
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        // TINGKATKAN KUALITAS: MAX_SIZE 800px untuk ketajaman lebih baik
                        const MAX_SIZE = 800; 
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                        } else {
                            if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, width, height);
                        // Kualitas 0.6 (60%) adalah titik optimal ketajaman vs ukuran file
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        };

        window.handleUpload = async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            const btn = document.getElementById('btn-upload');
            if (currentSelectedFiles.length === 0) { showToast('Pilih foto dulu!'); return; }

            btn.disabled = true;
            btn.innerHTML = `<div class="flex items-center justify-center gap-2"><div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>Memproses HD...</div>`;

            try {
                const imageUrls = [];
                for (const file of currentSelectedFiles) {
                    const comp = await compressImage(file);
                    imageUrls.push(comp);
                }

                const formData = new FormData(e.target);
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), {
                    date: formData.get('date'),
                    tema: formData.get('tema'),
                    description: formData.get('description'),
                    images: imageUrls,
                    likes: 0,
                    createdAt: new Date().toISOString()
                });
                showToast('Laporan HD Berhasil terbit!');
                window.setTab('home');
            } catch (err) {
                showToast('Gagal: Koleksi foto terlalu besar.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Simpan Laporan';
            }
        };

        window.handleLike = async (id) => {
            if (!currentUser) return;
            try {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'reports', id);
                await updateDoc(ref, { likes: increment(1) });
            } catch (e) {}
        };

        window.handleComment = async (id) => {
            if (!currentUser) return;
            const nameInput = document.getElementById(`name-input-${id}`);
            const commentInput = document.getElementById(`comment-input-${id}`);
            const name = nameInput ? nameInput.value.trim() : myName;
            const text = commentInput.value.trim();

            if (!name || !text) return;
            if (!myName) { myName = name; localStorage.setItem('al_ihsan_user_name', name); }

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'comments'), {
                    reportId: id, name, text, createdAt: new Date().toISOString()
                });
                commentInput.value = '';
                renderApp();
            } catch (e) {}
        };

        window.handleDelete = async (id) => {
            if (confirm("Hapus laporan ini?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', id));
                showToast('Dihapus');
            }
        };

        function showToast(msg) {
            const toast = document.querySelector('.toast-notif');
            if (toast) toast.remove();
            
            const newToast = document.createElement('div');
            newToast.className = 'toast-notif fixed bottom-24 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-full text-[10px] font-black uppercase tracking-widest z-[250] animate-bounce-short border border-white/10 shadow-2xl';
            newToast.innerText = msg;
            document.body.appendChild(newToast);
            setTimeout(() => newToast.remove(), 2500);
        }

        // --- UI ---
        function Navbar() {
            return `
                <nav class="bg-white/80 backdrop-blur-xl border-b border-gray-100 sticky top-0 z-50">
                    <div class="max-w-4xl mx-auto px-6 h-20 flex items-center justify-between">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="window.setTab('home')">
                            <img src="${LOGO_URL}" class="w-10 h-10 object-contain" onerror="this.src='https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=100&h=100&fit=crop'">
                            <div class="flex flex-col">
                                <h1 class="font-black text-gray-900 leading-none text-lg tracking-tight shimmer-effect">Al Ihsan</h1>
                                <p class="text-[8px] text-emerald-600 font-black uppercase tracking-widest mt-1">Gusdurian</p>
                            </div>
                        </div>
                        <div class="flex bg-gray-100 p-1.5 rounded-2xl gap-1">
                            <button onclick="window.setTab('home')" class="nav-btn ${activeTab === 'home' ? 'active' : ''}"><i data-lucide="layout-grid" class="w-5 h-5"></i></button>
                            <button onclick="window.setTab('admin')" class="nav-btn ${activeTab === 'admin' ? 'active' : ''}"><i data-lucide="plus-circle" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </nav>
            `;
        }

        function ImageSlider(images, reportId) {
            if (!images || images.length === 0) return '';
            return `
                <div class="relative w-full mb-6">
                    <div class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar gap-4 pb-2">
                        ${images.map(img => `
                            <div class="flex-none w-full h-[22rem] snap-center">
                                <img src="${img}" class="w-full h-full object-cover rounded-[2.5rem] border border-gray-50 shadow-sm" loading="lazy">
                            </div>
                        `).join('')}
                    </div>
                    ${images.length > 1 ? `
                        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-black/40 backdrop-blur-md text-white text-[9px] px-4 py-1.5 rounded-full font-black uppercase tracking-widest pointer-events-none border border-white/10">
                            Geser untuk lihat ${images.length} foto
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function ReportCard(report, index) {
            const rComments = comments.filter(c => c.reportId === report.id);
            return `
                <div class="bg-white border border-gray-100 rounded-[3.5rem] p-7 mb-10 shadow-sm hover:shadow-xl transition-shadow animate-slide-up" style="animation-delay: ${index * 100}ms">
                    <div class="flex justify-between items-start mb-6 px-2">
                        <div>
                            <p class="text-[9px] font-black text-emerald-600 uppercase tracking-widest mb-1">Momen Terkini</p>
                            <p class="text-xs font-bold text-gray-400 uppercase">${new Date(report.date).toLocaleDateString('id-ID', { dateStyle: 'long' })}</p>
                        </div>
                        ${isAdmin ? `<button onclick="window.handleDelete('${report.id}')" class="text-red-200 hover:text-red-500 transition-colors p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>` : ''}
                    </div>
                    ${ImageSlider(report.images, report.id)}
                    <div class="px-2 mb-6">
                        <h3 class="text-xl font-black text-gray-900 mb-3 tracking-tight">${report.tema}</h3>
                        <p class="text-gray-600 text-[14px] leading-relaxed whitespace-pre-wrap font-medium">${report.description}</p>
                    </div>
                    <div class="flex items-center justify-between border-t border-gray-50 pt-6 px-2 mb-6">
                        <button onclick="window.handleLike('${report.id}')" class="flex items-center gap-2 px-5 py-2.5 rounded-2xl bg-gray-50 text-gray-500 hover:bg-red-50 hover:text-red-500 transition-all active:scale-95">
                            <i data-lucide="heart" class="w-4 h-4 ${report.likes > 0 ? 'fill-red-500 text-red-500' : ''}"></i>
                            <span class="text-xs font-black">${report.likes || 0}</span>
                        </button>
                        <span class="text-[10px] font-black text-gray-300 uppercase tracking-widest">${rComments.length} Tanggapan</span>
                    </div>
                    <div class="space-y-3 mb-6 px-2">
                        ${rComments.slice(-3).map(c => `
                            <div class="bg-gray-50/50 p-4 rounded-3xl text-[13px] border border-gray-100/50">
                                <b class="text-emerald-600 block text-[10px] font-black uppercase mb-1">${c.name}</b>
                                <span class="text-gray-600 font-medium">${c.text}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="bg-gray-50 rounded-[2rem] p-4 flex gap-2 border border-gray-100 focus-within:ring-2 focus-within:ring-emerald-100 transition-all mx-2">
                        ${!myName ? `<input type="text" id="name-input-${report.id}" placeholder="Nama..." class="w-20 bg-transparent border-none text-[13px] font-black focus:ring-0 border-r border-gray-200 pr-2">` : ''}
                        <input type="text" id="comment-input-${report.id}" placeholder="Tulis tanggapan..." class="flex-1 bg-transparent border-none text-[13px] font-medium focus:ring-0">
                        <button onclick="window.handleComment('${report.id}')" class="bg-gray-900 text-white w-9 h-9 rounded-xl flex items-center justify-center hover:bg-emerald-600 transition-all"><i data-lucide="send" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `;
        }

        const renderApp = () => {
            const container = document.getElementById('app');
            if (!container) return;
            let html = Navbar();

            if (activeTab === 'home') {
                const filtered = reports.filter(r => (r.tema + r.description).toLowerCase().includes(searchTerm.toLowerCase()));
                html += `
                    <div class="max-w-2xl mx-auto px-6 py-10">
                        <div class="text-center mb-14">
                            <div class="inline-flex items-center gap-2 bg-emerald-50 text-emerald-700 text-[10px] font-black uppercase px-5 py-2 rounded-full tracking-widest mb-6">
                                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
                                Update Laporan Kegiatan
                            </div>
                            <h2 class="text-4xl font-black mb-8 shimmer-effect tracking-tight">Menciptakan Senyum<br>Al Ihsan</h2>
                            <div class="relative max-w-sm mx-auto">
                                <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-300 w-5 h-5"></i>
                                <input type="text" oninput="window.handleSearch(event)" placeholder="Cari kegiatan..." class="w-full bg-white border border-gray-100 rounded-full py-4 pl-14 pr-6 text-sm shadow-sm outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                        </div>
                        ${isLoadingData ? `<div class="flex flex-col items-center gap-4 py-10"><div class="w-8 h-8 border-4 border-emerald-100 border-t-emerald-500 rounded-full animate-spin"></div><p class="text-gray-400 font-bold text-[10px] uppercase tracking-widest">Sinkronisasi Cloud...</p></div>` : ''}
                        <div class="feed">${filtered.map((r, i) => ReportCard(r, i)).join('')}</div>
                        ${!isLoadingData && filtered.length === 0 ? `<div class="text-center py-24 bg-white rounded-[3rem] border border-gray-100 shadow-sm"><i data-lucide="inbox" class="w-12 h-12 text-gray-200 mx-auto mb-4"></i><p class="text-gray-400 font-black text-[10px] uppercase tracking-widest">Belum ada laporan</p></div>` : ''}
                    </div>
                `;
            } else {
                if (!isAdmin) {
                    html += `
                        <div class="max-w-xs mx-auto py-32">
                            <div class="bg-white p-12 rounded-[4rem] shadow-2xl border border-gray-100 text-center">
                                <div class="w-16 h-16 bg-gray-900 text-white rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-lg"><i data-lucide="shield-check" class="w-8 h-8"></i></div>
                                <h2 class="font-black text-2xl mb-8 tracking-tight">Akses Pengurus</h2>
                                <input type="password" id="admin-pass" placeholder="KODE" class="w-full bg-gray-50 rounded-2xl p-5 text-center text-3xl font-black mb-6 outline-none border-none focus:ring-2 focus:ring-gray-900 tracking-[0.3em]">
                                <button onclick="window.checkAdmin()" class="w-full bg-gray-900 text-white font-black py-5 rounded-3xl shadow-xl active:scale-95 transition-all uppercase tracking-widest text-xs">Masuk Panel</button>
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="max-w-2xl mx-auto px-6 py-10">
                            <div class="flex justify-between items-center mb-10">
                                <h2 class="text-3xl font-black tracking-tight">Panel Laporan</h2>
                                <button onclick="window.logoutAdmin()" class="bg-red-50 text-red-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Logout</button>
                            </div>
                            <form onsubmit="window.handleUpload(event)" class="bg-white p-10 rounded-[4rem] shadow-xl space-y-8 border border-gray-50">
                                <div class="bg-emerald-50/20 p-12 rounded-[3rem] border-2 border-dashed border-emerald-100 text-center group hover:bg-emerald-50/40 transition-all cursor-pointer">
                                    <input type="file" id="files" multiple accept="image/*" class="hidden" onchange="window.handleFileChange(event)">
                                    <label for="files" class="cursor-pointer">
                                        <div class="w-16 h-16 bg-white text-emerald-600 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-sm group-hover:scale-110 transition-transform"><i data-lucide="camera" class="w-8 h-8"></i></div>
                                        <p class="text-sm font-black text-emerald-800 uppercase tracking-widest">${currentSelectedFiles.length ? currentSelectedFiles.length + ' Foto Terpilih' : 'Pilih Foto HD'}</p>
                                        <p class="text-[9px] text-gray-400 mt-2 font-bold uppercase">Maks 5 Foto - Kualitas Optimal Cloud</p>
                                    </label>
                                </div>
                                ${selectedFilePreviews.length ? `<div class="grid grid-cols-5 gap-3 p-4 bg-gray-50 rounded-3xl border border-gray-100">${selectedFilePreviews.map(p => `<div class="aspect-square rounded-xl overflow-hidden border-2 border-white shadow-sm"><img src="${p}" class="w-full h-full object-cover"></div>`).join('')}</div>` : ''}
                                <div class="space-y-6">
                                    <div>
                                        <label class="block text-[10px] font-black uppercase text-gray-300 mb-2 ml-4 tracking-widest">Waktu Kegiatan</label>
                                        <input type="date" name="date" required class="w-full bg-gray-50 p-5 rounded-2xl border-none font-black outline-none focus:ring-2 focus:ring-emerald-500">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-black uppercase text-gray-300 mb-2 ml-4 tracking-widest">Tema Utama</label>
                                        <input type="text" name="tema" placeholder="Contoh: Belajar Bareng Relawan" required class="w-full bg-gray-50 p-5 rounded-2xl border-none font-black outline-none focus:ring-2 focus:ring-emerald-500">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-black uppercase text-gray-300 mb-2 ml-4 tracking-widest">Deskripsi Kegiatan</label>
                                        <textarea name="description" placeholder="Ceritakan momen indahnya di sini..." required rows="6" class="w-full bg-gray-50 p-5 rounded-2xl border-none font-medium outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
                                    </div>
                                </div>
                                <button type="submit" id="btn-upload" class="w-full bg-emerald-600 text-white font-black py-7 rounded-[2.5rem] shadow-xl shadow-emerald-50 hover:bg-emerald-700 active:scale-95 transition-all uppercase tracking-widest text-xs">Simpan ke Cloud</button>
                            </form>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
            lucide.createIcons();
        };

        initAuth();
    </script>
</body>
</html>
