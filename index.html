<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Laporan - Rumah Belajar Al Ihsan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        // --- State Management ---
        let isAdmin = false;
        let activeTab = 'home';
        let isLoaderHidden = false;

        // Data Awal (Mock Data)
        const initialReports = [
            {
                id: '1',
                date: '2023-10-27',
                description: 'Kegiatan belajar bersama adik-adik Rumah Belajar Al Ihsan hari ini sangat seru! Kami belajar tentang pentingnya toleransi dan kebersamaan.',
                images: ['https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=800&q=80'],
                likes: 12,
                createdAt: new Date().toISOString()
            }
        ];

        // Load data dari LocalStorage
        let reports = JSON.parse(localStorage.getItem('al_ihsan_reports')) || initialReports;
        let comments = JSON.parse(localStorage.getItem('al_ihsan_comments')) || [];
        let feedback = JSON.parse(localStorage.getItem('al_ihsan_feedback')) || [];

        const saveData = () => {
            try {
                localStorage.setItem('al_ihsan_reports', JSON.stringify(reports));
                localStorage.setItem('al_ihsan_comments', JSON.stringify(comments));
                localStorage.setItem('al_ihsan_feedback', JSON.stringify(feedback));
            } catch (e) {
                showToast('Gagal menyimpan: Memori penuh! Hapus beberapa laporan lama.');
            }
        };

        // --- Core Functions ---
        const hideLoader = () => { 
            if (isLoaderHidden) return;
            const loadingScreen = document.getElementById('loading');
            isLoaderHidden = true;
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    renderApp();
                }, 500);
            }
        };

        window.setTab = (tab) => { 
            activeTab = tab; 
            renderApp(); 
            window.scrollTo({top: 0, behavior: 'smooth'}); 
        };

        window.checkAdmin = () => { 
            if (document.getElementById('admin-pass').value === 'gusdurian') { 
                isAdmin = true; 
                renderApp(); 
            } else { 
                showToast('Kode akses salah!'); 
            } 
        };

        window.logoutAdmin = () => { isAdmin = false; activeTab = 'home'; renderApp(); };

        // --- Image Compression Utility (THE FIX) ---
        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        // Max resolution 1080px untuk menjaga performa
                        const MAX_WIDTH = 1080;
                        const MAX_HEIGHT = 1080;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Kompresi kualitas ke 0.7 (70%) JPEG
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        };

        // --- Event Handlers ---
        window.handleUpload = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-upload');
            const files = document.getElementById('photo-files').files;
            
            if (files.length === 0) {
                showToast('Pilih minimal satu foto!');
                return;
            }

            btn.disabled = true; 
            btn.innerHTML = `
                <div class="flex items-center justify-center gap-3">
                    <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                    Mengoptimalkan Gambar...
                </div>
            `;
            
            try {
                const formData = new FormData(e.target);
                // Kompresi paralel untuk kecepatan maksimal
                const imageUrls = await Promise.all(Array.from(files).map(file => compressImage(file)));
                
                const newReport = {
                    id: Date.now().toString(),
                    date: formData.get('date'),
                    description: formData.get('description'),
                    images: imageUrls,
                    likes: 0,
                    createdAt: new Date().toISOString()
                };

                reports.unshift(newReport);
                saveData();
                showToast('Laporan berhasil terbit!');
                window.setTab('home');
            } catch (err) {
                console.error(err);
                showToast('Gagal memproses gambar');
                btn.disabled = false; 
                btn.innerText = 'Terbitkan Laporan';
            }
        };

        window.handleLike = (id) => {
            const index = reports.findIndex(r => r.id === id);
            if (index !== -1) {
                reports[index].likes = (reports[index].likes || 0) + 1;
                saveData();
                renderApp();
            }
        };

        window.handleComment = (id) => {
            const input = document.getElementById(`comment-input-${id}`);
            if (!input.value.trim()) return;
            
            comments.push({
                reportId: id,
                text: input.value.trim(),
                createdAt: new Date().toISOString()
            });
            saveData();
            input.value = '';
            showToast('Komentar terkirim!');
            renderApp();
        };

        window.handleDelete = (id) => { 
            const confirmBox = document.createElement('div');
            confirmBox.className = 'fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6';
            confirmBox.innerHTML = `
                <div class="bg-white p-8 rounded-[2.5rem] max-w-sm w-full shadow-2xl animate-slide-up">
                    <h3 class="text-xl font-black mb-3">Hapus Laporan?</h3>
                    <p class="text-gray-500 mb-8 text-sm leading-relaxed">Data ini akan dihapus permanen dari memori perangkat Anda.</p>
                    <div class="flex gap-3">
                        <button id="confirm-cancel" class="flex-1 py-4 font-bold text-gray-400">Batal</button>
                        <button id="confirm-yes" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-black shadow-lg shadow-red-100">Hapus</button>
                    </div>
                </div>
            `;
            document.body.appendChild(confirmBox);
            
            document.getElementById('confirm-cancel').onclick = () => confirmBox.remove();
            document.getElementById('confirm-yes').onclick = () => {
                reports = reports.filter(r => r.id !== id);
                comments = comments.filter(c => c.reportId !== id);
                saveData();
                renderApp();
                confirmBox.remove();
                showToast('Laporan dihapus');
            };
        };

        window.handleFeedback = (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            feedback.push({
                name: formData.get('name'),
                message: formData.get('message'),
                createdAt: new Date().toISOString()
            });
            saveData();
            showToast('Pesan dikirim!');
            window.setTab('home');
        };

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900/95 backdrop-blur-md text-white px-8 py-4 rounded-full text-sm font-bold shadow-2xl z-[150] animate-bounce-short border border-white/10';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // --- Slider Logic ---
        function startAutoSlide(reportId, length) {
            const container = document.getElementById(`slider-${reportId}`);
            if (!container || length <= 1) return;
            const slides = container.querySelectorAll('.slide');
            const dots = container.querySelectorAll('.dot');
            const counter = container.querySelector('.slide-counter');
            let current = 0;
            
            const interval = setInterval(() => {
                if (!document.getElementById(`slider-${reportId}`)) { clearInterval(interval); return; }
                slides[current].classList.replace('opacity-100', 'opacity-0');
                slides[current].classList.replace('scale-100', 'scale-105');
                dots[current].classList.replace('w-4', 'w-1.5');
                dots[current].classList.replace('bg-white', 'bg-white/40');
                
                current = (current + 1) % length;
                
                slides[current].classList.replace('opacity-0', 'opacity-100');
                slides[current].classList.replace('scale-105', 'scale-100');
                dots[current].classList.replace('w-1.5', 'w-4');
                dots[current].classList.replace('bg-white/40', 'bg-white');
                if (counter) counter.innerText = current + 1;
            }, 4000);
        }

        // --- UI Components ---
        const LOGO_URL = "https://img.sanishtech.com/u/b4b2625dd6eb1438fbc393468d2ee7bf.png";

        function Navbar() {
            return `
                <nav class="bg-white/80 backdrop-blur-2xl border-b border-gray-100 sticky top-0 z-50">
                    <div class="max-w-4xl mx-auto px-6 h-20 flex items-center justify-between">
                        <div class="flex items-center gap-3 cursor-pointer group" onclick="window.setTab('home')">
                            <div class="w-11 h-11 bg-white rounded-2xl flex items-center justify-center overflow-hidden shadow-sm group-hover:scale-105 transition-transform border border-gray-50">
                                <img src="${LOGO_URL}" class="w-full h-full object-contain p-1.5" onerror="this.src='https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=100&h=100&fit=crop'">
                            </div>
                            <div>
                                <h1 class="font-black text-gray-900 leading-none text-lg tracking-tight">Al Ihsan</h1>
                                <p class="text-[8px] text-emerald-600 font-black uppercase tracking-[0.2em] mt-1">Rumah Belajar</p>
                            </div>
                        </div>
                        <div class="flex bg-gray-100/50 p-1.5 rounded-2xl gap-1">
                            <button onclick="window.setTab('home')" class="nav-btn ${activeTab === 'home' ? 'active' : ''}">
                                <i data-lucide="layout-grid" class="w-5 h-5"></i>
                            </button>
                            <button onclick="window.setTab('feedback')" class="nav-btn ${activeTab === 'feedback' ? 'active' : ''}">
                                <i data-lucide="message-square" class="w-5 h-5"></i>
                            </button>
                            <button onclick="window.setTab('admin')" class="nav-btn ${activeTab === 'admin' ? 'active' : ''}">
                                <i data-lucide="shield-check" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </nav>
            `;
        }

        function ImageSlider(images, reportId) {
            if (!images || images.length === 0) return `<div class="w-full h-64 bg-gray-50 rounded-[2rem] flex items-center justify-center mb-4"><i data-lucide="image" class="text-gray-200 w-12 h-12"></i></div>`;
            
            const slides = images.map((img, idx) => `
                <div class="slide absolute inset-0 transition-all duration-1000 transform ${idx === 0 ? 'opacity-100 scale-100' : 'opacity-0 scale-105'}">
                    <img src="${img}" class="w-full h-full object-cover rounded-[2.2rem]" alt="Kegiatan" loading="lazy">
                </div>
            `).join('');

            const dots = images.map((_, idx) => `<div class="dot h-1.5 rounded-full transition-all duration-300 ${idx === 0 ? 'w-4 bg-white' : 'w-1.5 bg-white/40'}"></div>`).join('');

            setTimeout(() => startAutoSlide(reportId, images.length), 100);

            return `
                <div id="slider-${reportId}" class="relative w-full h-[22rem] bg-gray-100 overflow-hidden rounded-[2.5rem] mb-6 shadow-inner border border-gray-50">
                    ${slides}
                    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2 z-10 bg-black/10 backdrop-blur-md p-2 rounded-full">
                        ${dots}
                    </div>
                    <div class="absolute top-6 right-6 bg-black/40 backdrop-blur-md text-white text-[9px] px-3 py-1.5 rounded-full font-black border border-white/10 uppercase tracking-widest">
                        <span class="slide-counter">1</span> / ${images.length}
                    </div>
                </div>
            `;
        }

        function ReportCard(report, index) {
            const reportComments = comments.filter(c => c.reportId === report.id);
            const delay = Math.min(index * 100, 800);
            return `
                <div class="report-card bg-white border border-gray-100 rounded-[3rem] p-6 mb-12 shadow-sm hover:shadow-2xl hover:-translate-y-1.5 transition-all duration-700 animate-slide-up" style="animation-delay: ${delay}ms">
                    <div class="flex justify-between items-start mb-6 px-2">
                        <div class="flex flex-col">
                            <p class="text-[11px] font-black text-emerald-600 uppercase tracking-widest mb-1">Laporan Kegiatan</p>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-tight">${new Date(report.date).toLocaleDateString('id-ID', { dateStyle: 'long' })}</p>
                        </div>
                        ${isAdmin ? `
                            <button onclick="window.handleDelete('${report.id}')" class="w-10 h-10 rounded-2xl flex items-center justify-center text-red-200 hover:bg-red-50 hover:text-red-500 transition-all">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        ` : ''}
                    </div>
                    
                    ${ImageSlider(report.images, report.id)}
                    
                    <div class="px-2">
                        <p class="text-gray-700 leading-relaxed text-md mb-8 font-medium">${report.description}</p>
                        
                        <div class="flex items-center justify-between border-t border-gray-50 pt-6">
                            <div class="flex items-center gap-4">
                                <button onclick="window.handleLike('${report.id}')" class="flex items-center gap-2 px-5 py-2.5 rounded-2xl bg-gray-50 text-gray-500 hover:bg-red-50 hover:text-red-500 transition-all group/like active:scale-90">
                                    <i data-lucide="heart" class="w-5 h-5 ${report.likes > 0 ? 'fill-red-500 text-red-500' : ''} group-hover/like:scale-110 transition-transform"></i>
                                    <span class="text-xs font-black">${report.likes || 0}</span>
                                </button>
                                <div class="flex items-center gap-2 text-gray-300">
                                    <i data-lucide="message-circle" class="w-5 h-5"></i>
                                    <span class="text-xs font-black">${reportComments.length}</span>
                                </div>
                            </div>
                        </div>

                        <div class="mt-6 space-y-2">
                            ${reportComments.slice(-2).map(c => `
                                <div class="text-[13px] text-gray-500 bg-gray-50/50 p-4 rounded-2xl flex gap-3">
                                    <span class="font-medium">${c.text}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-6 flex gap-2 bg-gray-50 p-2 rounded-2xl border border-gray-100">
                            <input type="text" id="comment-input-${report.id}" placeholder="Kirim tanggapan..." class="flex-1 bg-transparent border-none px-4 py-2 text-sm focus:ring-0 placeholder:text-gray-400">
                            <button onclick="window.handleComment('${report.id}')" class="bg-gray-900 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-emerald-600 transition-all">
                                <i data-lucide="send" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderHome() {
            return `
                <div class="max-w-2xl mx-auto px-6 py-12">
                    <header class="mb-14 text-center">
                        <div class="inline-flex items-center gap-2 bg-emerald-50 text-emerald-700 text-[10px] font-black uppercase px-5 py-2 rounded-full tracking-widest mb-6">
                            Terupdate Hari Ini
                        </div>
                        <h2 class="text-4xl font-black text-gray-900 tracking-tight leading-tight">Mewarnai Masa Depan<br>Bersama Al Ihsan</h2>
                    </header>
                    <div id="feed">
                        ${reports.length ? reports.map((r, i) => ReportCard(r, i)).join('') : `
                            <div class="text-center py-32 bg-white rounded-[3rem] border border-gray-100">
                                <i data-lucide="ghost" class="w-16 h-16 text-gray-100 mx-auto mb-6"></i>
                                <p class="text-gray-300 font-bold text-xs uppercase tracking-widest">Belum ada aktivitas</p>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        function renderFeedback() {
            return `
                <div class="max-w-md mx-auto px-6 py-20">
                    <div class="bg-white rounded-[3.5rem] p-10 shadow-2xl shadow-blue-50 border border-blue-50">
                        <div class="text-center mb-10">
                            <div class="w-20 h-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-xl">
                                <i data-lucide="heart-handshake" class="w-10 h-10"></i>
                            </div>
                            <h2 class="text-3xl font-black text-gray-900 leading-tight">Suara Anda</h2>
                            <p class="text-gray-400 text-sm mt-4 font-medium">Beri semangat atau masukan untuk Rumah Belajar Al Ihsan.</p>
                        </div>
                        <form onsubmit="window.handleFeedback(event)" class="space-y-6">
                            <input type="text" name="name" required class="w-full bg-gray-50 border-none rounded-2xl p-5 focus:ring-2 focus:ring-blue-500 transition-all font-bold" placeholder="Nama Anda">
                            <textarea name="message" required rows="4" class="w-full bg-gray-50 border-none rounded-2xl p-5 focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Pesan semangat..."></textarea>
                            <button type="submit" class="w-full bg-blue-600 text-white font-black py-6 rounded-2xl shadow-xl hover:bg-blue-700 active:scale-95 transition-all">Kirim Pesan</button>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderAdmin() {
            if (!isAdmin) {
                return `
                    <div class="max-w-md mx-auto px-6 py-32">
                        <div class="bg-white rounded-[3.5rem] p-12 shadow-2xl border border-gray-100 text-center">
                            <div class="w-20 h-20 bg-gray-900 text-white rounded-full flex items-center justify-center mx-auto mb-10">
                                <i data-lucide="lock" class="w-8 h-8"></i>
                            </div>
                            <h2 class="text-2xl font-black mb-8">Area Pengurus</h2>
                            <input type="password" id="admin-pass" placeholder="KODE AKSES" class="w-full bg-gray-50 border-none rounded-2xl p-6 mb-6 text-center text-2xl tracking-[0.3em] focus:ring-2 focus:ring-gray-900 font-black">
                            <button onclick="window.checkAdmin()" class="w-full bg-gray-900 text-white font-black py-6 rounded-2xl hover:bg-black transition-all">Masuk Sekarang</button>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="max-w-2xl mx-auto px-6 py-12">
                    <div class="flex justify-between items-center mb-12">
                        <h2 class="text-3xl font-black">Panel Laporan</h2>
                        <button onclick="window.logoutAdmin()" class="bg-red-50 text-red-600 px-6 py-3 rounded-2xl text-[10px] font-black hover:bg-red-600 hover:text-white transition-all uppercase">Keluar</button>
                    </div>
                    <div class="bg-white rounded-[3.5rem] p-10 shadow-xl border border-gray-50">
                        <form onsubmit="window.handleUpload(event)" class="space-y-8">
                            <div class="bg-emerald-50/20 p-12 rounded-[2.5rem] border-2 border-emerald-100 border-dashed text-center group cursor-pointer hover:bg-emerald-50/50 transition-colors">
                                <input type="file" id="photo-files" multiple accept="image/*" class="hidden">
                                <label for="photo-files" class="cursor-pointer flex flex-col items-center">
                                    <div class="w-16 h-16 bg-white text-emerald-600 rounded-3xl flex items-center justify-center mb-4 shadow-sm group-hover:scale-110 transition-transform"><i data-lucide="plus" class="w-8 h-8"></i></div>
                                    <span class="text-sm font-black text-emerald-800 uppercase tracking-widest">Tambah Foto</span>
                                    <p class="text-[10px] text-gray-400 mt-2 font-bold">PROSES LEBIH CEPAT & RINGAN</p>
                                </label>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-[10px] font-black uppercase text-gray-300 mb-3 ml-4 tracking-widest">Waktu Kegiatan</label>
                                    <input type="date" name="date" required class="w-full bg-gray-50 border-none rounded-2xl p-5 font-bold focus:ring-2 focus:ring-emerald-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase text-gray-300 mb-3 ml-4 tracking-widest">Apa Yang Terjadi?</label>
                                <textarea name="description" required rows="4" class="w-full bg-gray-50 border-none rounded-2xl p-5 text-sm font-medium focus:ring-2 focus:ring-emerald-500" placeholder="Ceritakan kegiatannya..."></textarea>
                            </div>
                            <button type="submit" id="btn-upload" class="w-full bg-emerald-600 text-white font-black py-7 rounded-3xl shadow-xl shadow-emerald-50 hover:bg-emerald-700 active:scale-[0.98] transition-all uppercase tracking-widest">Terbitkan Laporan</button>
                        </form>
                    </div>
                </div>
            `;
        }

        async function renderApp() {
            const appContainer = document.getElementById('app');
            let content = Navbar();
            if (activeTab === 'home') content += renderHome();
            else if (activeTab === 'feedback') content += renderFeedback();
            else if (activeTab === 'admin') content += renderAdmin();
            appContainer.innerHTML = content;
            lucide.createIcons();
        }

        window.onload = () => {
            setTimeout(hideLoader, 1500);
        };
    </script>
    <style>
        @keyframes slide-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce-short { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -10px); } }
        .animate-slide-up { animation: slide-up 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-bounce-short { animation: bounce-short 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            background-color: #fafbfc;
            font-family: 'Inter', sans-serif; 
            color: #334155;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-btn {
            padding: 10px 22px;
            border-radius: 14px;
            color: #94a3b8;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-btn.active {
            background-color: white;
            color: #10b981;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }

        #loading { transition: opacity 0.5s ease; }
    </style>
</head>
<body class="pb-24">
    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-[200]">
        <div class="flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-emerald-50 border-t-emerald-500 rounded-full animate-spin"></div>
            <p class="mt-8 text-[10px] font-black text-gray-400 uppercase tracking-[0.5em] animate-pulse">Menyiapkan Portal...</p>
        </div>
    </div>

    <div id="app"></div>

    <button onclick="document.getElementById('help-modal').classList.remove('hidden')" class="fixed bottom-10 right-8 w-14 h-14 bg-white shadow-xl rounded-2xl flex items-center justify-center text-gray-400 border border-gray-100 hover:scale-110 active:scale-95 transition-all z-40">
        <i data-lucide="help-circle" class="w-6 h-6"></i>
    </button>

    <div id="help-modal" class="fixed inset-0 bg-black/40 backdrop-blur-md z-[160] flex items-center justify-center p-6 hidden">
        <div class="bg-white rounded-[3rem] p-10 max-w-sm w-full shadow-2xl animate-slide-up">
            <h3 class="text-2xl font-black mb-6 tracking-tight">Info Portal</h3>
