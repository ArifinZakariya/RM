<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Laporan - Rumah Belajar Al Ihsan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce-short { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -5px); } }
        .animate-slide-up { animation: slide-up 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-bounce-short { animation: bounce-short 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .shimmer-effect {
            background: linear-gradient(120deg, #111827 30%, #10b981 50%, #111827 70%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer-anim 3s linear infinite;
        }
        @keyframes shimmer-anim {
            0% { background-position: -100% center; }
            100% { background-position: 100% center; }
        } 

        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .nav-btn { padding: 10px 20px; border-radius: 14px; color: #94a3b8; transition: all 0.3s; }
        .nav-btn.active { background-color: white; color: #059669; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        #loading { transition: opacity 0.5s ease; opacity: 1; display: flex; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input, textarea { font-size: 16px !important; }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
        .expanded-text {
            display: block !important;
        }
    </style>
</head>
<body class="pb-24">
    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-[200]">
        <div class="flex flex-col items-center">
            <div class="relative w-20 h-20 flex items-center justify-center">
                <div class="absolute inset-0 border-4 border-emerald-50 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                <div class="w-10 h-10 overflow-hidden rounded-xl bg-gray-100 flex items-center justify-center">
                    <img src="https://img.sanishtech.com/u/b4b2625dd6eb1438fbc393468d2ee7bf.png" alt="Logo" class="w-full h-full object-contain">
                </div>
            </div>
            <div class="mt-6 text-center">
                <p class="text-[14px] font-black text-gray-900 uppercase tracking-[0.2em] shimmer-effect">Rumah Belajar Al Ihsan</p>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-[0.3em] mt-2">Gusdurian Mojokerto</p>
            </div>
        </div>
    </div>

    <div id="app"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://dphnwhleycntavygvbfh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6BadphnwhleycntavygvbfhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxODQ5NTAsImV4cCI6MjA4ODc2MDk1MH0.ezXfcfR5kKMXyIL0IhRCPBSVf0Gf_Crlco62jxhiU-Q';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        const LOGO_URL = "https://img.sanishtech.com/u/b4b2625dd6eb1438fbc393468d2ee7bf.png";

        // --- Global State ---
        let isAdmin = false;
        let activeTab = 'home';
        let reports = [];
        let comments = [];
        let searchTerm = "";
        let selectedFilePreviews = [];
        let currentSelectedFiles = [];
        let expandedReports = new Set();
        let myName = localStorage.getItem('al_ihsan_user_name') || "";
        let isLoadingData = true;

        // --- Data Fetching ---
        const fetchData = async () => {
            try {
                const [rResp, cResp] = await Promise.all([
                    supabase.from('reports').select('*').order('createdAt', { ascending: false }),
                    supabase.from('comments').select('*')
                ]);
                reports = rResp.data || [];
                comments = cResp.data || [];
            } catch (err) {
                console.error("Fetch Error:", err);
            } finally {
                isLoadingData = false;
                renderApp();
                hideLoader();
            }
        };

        const hideLoader = () => {
            const loader = document.getElementById('loading');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }
        };

        // --- Handlers ---
        window.handleFileChange = (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 5) { showToast('Maksimal 5 foto!'); e.target.value = ""; return; }
            currentSelectedFiles = files;
            selectedFilePreviews.forEach(url => URL.revokeObjectURL(url));
            selectedFilePreviews = files.map(file => URL.createObjectURL(file));
            renderApp();
        };

        const compressImageToBlob = (file) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_W = 1000;
                    let w = img.width, h = img.height;
                    if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7);
                };
            });
        };

        window.handleUpload = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-upload');
            if (currentSelectedFiles.length === 0) { showToast('Pilih foto dulu!'); return; }
            
            btn.disabled = true;
            btn.innerHTML = `<span class="flex items-center gap-2 justify-center"><div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Mengunggah...</span>`;

            try {
                const imageUrls = [];
                for (const file of currentSelectedFiles) {
                    const blob = await compressImageToBlob(file);
                    const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.jpg`;
                    const { error: uploadError } = await supabase.storage.from('images').upload(fileName, blob);
                    if (uploadError) throw uploadError;
                    const { data: urlData } = supabase.storage.from('images').getPublicUrl(fileName);
                    imageUrls.push(urlData.publicUrl);
                }

                const formData = new FormData(e.target);
                const { error: dbError } = await supabase.from('reports').insert([{
                    date: formData.get('date'),
                    tema: formData.get('tema'),
                    description: formData.get('description'),
                    images: imageUrls,
                    likes: 0,
                    createdAt: new Date().toISOString()
                }]);

                if (dbError) throw dbError;

                showToast('Berhasil terbit!');
                currentSelectedFiles = [];
                selectedFilePreviews = [];
                setTimeout(() => { fetchData(); window.setTab('home'); }, 1000);

            } catch (err) {
                console.error("Upload Error:", err);
                showToast(`Gagal: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Terbitkan Laporan';
            }
        };

        window.handleLike = async (id) => {
            const report = reports.find(r => r.id === id);
            await supabase.from('reports').update({ likes: (report.likes || 0) + 1 }).eq('id', id);
            fetchData();
        };

        window.handleComment = async (id) => {
            const nInput = document.getElementById(`name-input-${id}`);
            const cInput = document.getElementById(`comment-input-${id}`);
            const name = nInput ? nInput.value.trim() : myName;
            const text = cInput.value.trim();
            if (!name || !text) return;
            if (!myName) { myName = name; localStorage.setItem('al_ihsan_user_name', name); }
            await supabase.from('comments').insert([{ reportId: id, name, text, createdAt: new Date().toISOString() }]);
            fetchData();
        };

        window.handleDelete = async (id) => {
            if (confirm("Hapus laporan ini?")) {
                await supabase.from('reports').delete().eq('id', id);
                showToast('Laporan dihapus');
                fetchData();
            }
        };

        window.toggleDescription = (id) => {
            if (expandedReports.has(id)) {
                expandedReports.delete(id);
            } else {
                expandedReports.add(id);
            }
            renderApp();
        };

        window.setTab = (tab) => {
            activeTab = tab;
            selectedFilePreviews = [];
            currentSelectedFiles = [];
            renderApp();
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.handleSearch = (e) => { searchTerm = e.target.value.toLowerCase(); renderApp(); };
        window.checkAdmin = () => {
            const pass = document.getElementById('admin-pass').value;
            if (pass.toLowerCase() === 'gusdurian') { isAdmin = true; renderApp(); }
            else { showToast('Kode salah!'); }
        };
        window.logoutAdmin = () => { isAdmin = false; activeTab = 'home'; renderApp(); };

        function showToast(msg) {
            const existing = document.querySelector('.toast-notif');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.className = 'toast-notif fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-[10px] font-black uppercase tracking-widest z-[250] animate-bounce-short border border-white/10 shadow-2xl';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => { if(t) t.remove(); }, 3000);
        }

        // --- UI Components ---
        function Navbar() {
            return `
                <nav class="bg-white/80 backdrop-blur-xl border-b border-gray-100 sticky top-0 z-50">
                    <div class="max-w-4xl mx-auto px-6 h-20 flex items-center justify-between">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="window.setTab('home')">
                            <img src="${LOGO_URL}" class="w-9 h-9 object-contain">
                            <div class="flex flex-col">
                                <h1 class="font-black text-gray-900 leading-none text-base tracking-tight shimmer-effect uppercase tracking-tighter">AL IHSAN</h1>
                                <p class="text-[7px] text-emerald-600 font-black uppercase tracking-widest mt-1 leading-none">Rumah Belajar</p>
                            </div>
                        </div>
                        <div class="flex bg-gray-100 p-1.5 rounded-2xl gap-1">
                            <button onclick="window.setTab('home')" class="nav-btn ${activeTab === 'home' ? 'active' : ''}"><i data-lucide="home" class="w-5 h-5"></i></button>
                            <button onclick="window.setTab('admin')" class="nav-btn ${activeTab === 'admin' ? 'active' : ''}"><i data-lucide="plus-circle" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </nav>
            `;
        }

        function ImageSlider(images) {
            if (!images || images.length === 0) return '';
            return `
                <div class="relative w-full mb-5">
                    <div class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar gap-3 pb-2">
                        ${images.map(img => `
                            <div class="flex-none w-full aspect-[4/3] max-h-80 snap-center">
                                <img src="${img}" class="w-full h-full object-cover rounded-[2rem] border border-gray-50 shadow-sm" loading="lazy">
                            </div>
                        `).join('')}
                    </div>
                    ${images.length > 1 ? `<div class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/40 backdrop-blur-md text-white text-[8px] px-3 py-1.5 rounded-full font-black uppercase tracking-widest pointer-events-none border border-white/10 flex items-center gap-1.5">Geser <i data-lucide="chevron-right" class="w-2.5 h-2.5"></i></div>` : ''}
                </div>
            `;
        }

        function ReportCard(report, index) {
            const rComments = comments.filter(c => c.reportId == report.id);
            const isExpanded = expandedReports.has(report.id);
            const needsTruncation = report.description && report.description.length > 150;
            
            return `
                <div class="bg-white border border-gray-100 rounded-[2.5rem] p-5 mb-8 shadow-sm animate-slide-up overflow-hidden" style="animation-delay: ${index * 100}ms">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-emerald-50 flex items-center justify-center border border-emerald-100">
                                <i data-lucide="calendar" class="w-4 h-4 text-emerald-600"></i>
                            </div>
                            <div>
                                <p class="text-[8px] font-black text-emerald-600 uppercase tracking-widest mb-0.5">Kegiatan Rutin</p>
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">${new Date(report.date).toLocaleDateString('id-ID', { dateStyle: 'long' })}</p>
                            </div>
                        </div>
                        ${isAdmin ? `<button onclick="window.handleDelete('${report.id}')" class="text-red-300 hover:text-red-500 p-2"><i data-lucide="trash" class="w-4 h-4"></i></button>` : ''}
                    </div>
                    
                    ${ImageSlider(report.images)}

                    <div class="mb-4">
                        <h3 class="text-[16px] font-black text-gray-900 mb-2 leading-tight">${report.tema}</h3>
                        <div class="relative">
                            <p id="desc-${report.id}" class="text-gray-600 text-[13px] leading-relaxed whitespace-pre-wrap font-medium transition-all ${!isExpanded && needsTruncation ? 'line-clamp-3' : ''}">
                                ${report.description}
                            </p>
                            ${needsTruncation ? `
                                <button onclick="window.toggleDescription('${report.id}')" class="text-emerald-600 text-[11px] font-black uppercase tracking-wider mt-2 flex items-center gap-1 hover:text-emerald-700">
                                    ${isExpanded ? 'Sembunyikan' : 'Baca Selengkapnya'}
                                    <i data-lucide="${isExpanded ? 'chevron-up' : 'chevron-down'}" class="w-3 h-3"></i>
                                </button>
                            ` : ''}
                        </div>
                    </div>

                    <div class="flex items-center justify-between border-t border-gray-50 pt-4 mb-4">
                        <button onclick="window.handleLike('${report.id}')" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-gray-50 text-gray-500 active:scale-90 transition-all">
                            <i data-lucide="heart" class="w-4 h-4 ${report.likes > 0 ? 'fill-red-500 text-red-500' : ''}"></i>
                            <span class="text-xs font-black">${report.likes || 0}</span>
                        </button>
                        <span class="text-[9px] font-black text-gray-300 uppercase tracking-widest">${rComments.length} Komentar</span>
                    </div>

                    <div class="space-y-2 mb-4">
                        ${rComments.slice(-2).map(c => `
                            <div class="bg-gray-50/70 p-3 rounded-2xl text-[12px]">
                                <b class="text-emerald-600 block text-[9px] font-black uppercase mb-0.5">${c.name}</b>
                                <span class="text-gray-600 font-medium">${c.text}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="bg-gray-100 rounded-2xl p-2.5 flex gap-2 border border-transparent focus-within:border-emerald-200 focus-within:bg-white transition-all">
                        ${!myName ? `<input type="text" id="name-input-${report.id}" placeholder="Nama" class="w-16 bg-transparent border-none text-[11px] font-black focus:ring-0 px-2">` : ''}
                        <input type="text" id="comment-input-${report.id}" placeholder="Tulis tanggapan..." class="flex-1 bg-transparent border-none text-[11px] font-medium focus:ring-0">
                        <button onclick="window.handleComment('${report.id}')" class="bg-gray-900 text-white w-8 h-8 rounded-lg flex items-center justify-center shrink-0"><i data-lucide="send" class="w-3.5 h-3.5"></i></button>
                    </div>
                </div>
            `;
        }

        const renderApp = () => {
            const container = document.getElementById('app');
            if (!container) return;
            let html = Navbar();

            if (isLoadingData) {
                html += `<div class="py-20 text-center flex flex-col items-center"><div class="w-10 h-10 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div><p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Memuat Cerita Al Ihsan...</p></div>`;
            } else if (activeTab === 'home') {
                const filtered = reports.filter(r => (r.tema + r.description).toLowerCase().includes(searchTerm));
                html += `
                    <div class="max-w-xl mx-auto px-5 py-6">
                        <div class="text-center mb-10">
                            <h2 class="text-2xl font-black mb-6 tracking-tight shimmer-effect leading-tight">Mewujudkan Senyum<br>Anak Bangsa</h2>
                            <div class="relative group">
                                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 w-4 h-4 transition-colors group-focus-within:text-emerald-500"></i>
                                <input type="text" oninput="window.handleSearch(event)" placeholder="Cari kegiatan..." class="w-full bg-white border border-gray-100 rounded-2xl py-3.5 pl-12 pr-4 text-xs shadow-sm outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                            </div>
                        </div>
                        <div class="feed">${filtered.length ? filtered.map((r, i) => ReportCard(r, i)).join('') : '<div class="text-center py-20 opacity-30"><i data-lucide="info" class="w-12 h-12 mx-auto mb-4"></i><p class="text-[10px] font-black uppercase tracking-widest">Laporan Tidak Ditemukan</p></div>'}</div>
                    </div>
                `;
            } else if (activeTab === 'admin') {
                if (!isAdmin) {
                    html += `
                        <div class="max-w-xs mx-auto py-24 px-5">
                            <div class="bg-white p-8 rounded-[3rem] shadow-xl text-center border border-gray-50">
                                <div class="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                    <i data-lucide="lock" class="w-8 h-8 text-emerald-600"></i>
                                </div>
                                <h2 class="font-black text-lg mb-2 tracking-tight uppercase tracking-widest">Akses Pengurus</h2>
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-6">Masukkan kode akses</p>
                                <input type="password" id="admin-pass" placeholder="••••••••" class="w-full bg-gray-50 rounded-xl p-4 text-center text-xl font-black mb-4 outline-none focus:ring-2 focus:ring-emerald-500 tracking-[0.3em]">
                                <button onclick="window.checkAdmin()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg text-[10px] tracking-widest uppercase">Masuk Sekarang</button>
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="max-w-xl mx-auto px-5 py-8">
                            <div class="flex justify-between items-center mb-8">
                                <div>
                                    <h2 class="text-2xl font-black tracking-tight uppercase">Tulis Laporan</h2>
                                    <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1">Dokumentasikan kebaikan hari ini</p>
                                </div>
                                <button onclick="window.logoutAdmin()" class="text-red-500 text-[10px] font-black uppercase tracking-widest px-3 py-2 bg-red-50 rounded-xl hover:bg-red-100 transition-colors">Keluar</button>
                            </div>
                            <form onsubmit="window.handleUpload(event)" class="bg-white p-6 rounded-[2.5rem] shadow-xl space-y-6">
                                <div class="bg-emerald-50/20 p-8 rounded-[2rem] border-2 border-dashed border-emerald-100 text-center relative hover:bg-emerald-50/40 transition-colors">
                                    <input type="file" id="files" multiple accept="image/*" class="hidden" onchange="window.handleFileChange(event)">
                                    <label for="files" class="cursor-pointer block">
                                        <div class="w-12 h-12 bg-white text-emerald-600 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-sm border border-emerald-50"><i data-lucide="camera" class="w-6 h-6"></i></div>
                                        <p class="text-[11px] font-black text-emerald-800 uppercase tracking-widest">${currentSelectedFiles.length ? currentSelectedFiles.length + ' Foto Terpilih' : 'Upload Dokumentasi'}</p>
                                        <p class="text-[8px] text-emerald-600/50 mt-1 uppercase font-bold tracking-tighter">Maksimal 5 Foto</p>
                                    </label>
                                </div>
                                ${selectedFilePreviews.length ? `<div class="grid grid-cols-5 gap-2 px-2">${selectedFilePreviews.map(p => `<div class="aspect-square rounded-lg overflow-hidden border border-gray-100 shadow-sm"><img src="${p}" class="w-full h-full object-cover"></div>`).join('')}</div>` : ''}
                                <div class="space-y-4">
                                    <div class="bg-gray-50 rounded-xl p-3">
                                        <label class="block text-[8px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Tanggal Kegiatan</label>
                                        <input type="date" name="date" required class="w-full bg-transparent border-none font-bold text-xs outline-none focus:ring-0">
                                    </div>
                                    <div class="bg-gray-50 rounded-xl p-3">
                                        <label class="block text-[8px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Nama Kegiatan</label>
                                        <input type="text" name="tema" placeholder="Contoh: Belajar Tajwid Bareng" required class="w-full bg-transparent border-none font-bold text-xs outline-none focus:ring-0">
                                    </div>
                                    <div class="bg-gray-50 rounded-xl p-3">
                                        <label class="block text-[8px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Deskripsi Lengkap</label>
                                        <textarea name="description" placeholder="Apa saja yang dilakukan anak-anak hari ini?" required rows="5" class="w-full bg-transparent border-none text-xs font-medium outline-none focus:ring-0"></textarea>
                                    </div>
                                </div>
                                <button type="submit" id="btn-upload" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-emerald-700 transition-all uppercase tracking-widest text-[11px] flex items-center justify-center gap-2">
                                    Terbitkan Laporan <i data-lucide="plus-circle" class="w-4 h-4"></i>
                                </button>
                            </form>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
            lucide.createIcons();
        };

        // --- Init ---
        fetchData();
    </script>
</body>
</html>
