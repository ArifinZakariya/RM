<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Laporan - Rumah Belajar Al Ihsan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script>
        // --- Manajemen State (Lokal) ---
        let isAdmin = false;
        let activeTab = 'home';
        let isLoaderHidden = false;
        let selectedFilePreviews = [];
        let currentSelectedFiles = []; 
        let searchTerm = "";
        let myName = localStorage.getItem('al_ihsan_user_name') || "";

        // Memuat data dari LocalStorage
        let reports = JSON.parse(localStorage.getItem('al_ihsan_reports_v2')) || [];
        let comments = JSON.parse(localStorage.getItem('al_ihsan_comments_v2')) || [];

        // Fungsi Simpan dengan Manajemen Memori Otomatis
        const saveData = () => {
            try {
                localStorage.setItem('al_ihsan_reports_v2', JSON.stringify(reports));
                localStorage.setItem('al_ihsan_comments_v2', JSON.stringify(comments));
                return true;
            } catch (e) {
                console.warn("Storage Full, cleaning up...", e);
                // Jika memori penuh, hapus laporan paling lama secara agresif
                if (reports.length > 2) {
                    reports.pop(); 
                    return saveData(); 
                }
                showToast('Gagal: Memori HP benar-benar penuh!');
                return false;
            }
        };

        // --- Fungsi Inti ---
        window.hideLoader = () => { 
            if (isLoaderHidden) return;
            const loadingScreen = document.getElementById('loading');
            isLoaderHidden = true;
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                setTimeout(() => { loadingScreen.style.display = 'none'; renderApp(); }, 500);
            }
        };

        window.setTab = (tab) => { 
            activeTab = tab; 
            selectedFilePreviews = [];
            currentSelectedFiles = [];
            renderApp(); 
            window.scrollTo({top: 0, behavior: 'smooth'}); 
        };

        window.handleSearch = (e) => {
            searchTerm = e.target.value.toLowerCase();
            renderApp();
        };

        window.checkAdmin = () => { 
            if (document.getElementById('admin-pass').value === 'gusdurian') { 
                isAdmin = true; renderApp(); 
            } else { showToast('Kode akses salah!'); } 
        };

        window.logoutAdmin = () => { isAdmin = false; activeTab = 'home'; renderApp(); };

        window.handleFileChange = (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 5) {
                showToast('Maksimal 5 foto per postingan!');
                e.target.value = "";
                return;
            }
            currentSelectedFiles = files;
            selectedFilePreviews.forEach(url => URL.revokeObjectURL(url));
            selectedFilePreviews = files.map(file => URL.createObjectURL(file));
            renderApp(); 
        };

        // Kompresi Standar (Ditingkatkan dari 480px ke 800px)
        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_SIZE = 800; // Resolusi standar untuk hasil lebih tajam
                        
                        if (width > height) {
                            if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                        } else {
                            if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Kualitas 0.6 (60%) - Standar web yang jernih namun efisien
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.onerror = () => reject("Gagal memuat gambar");
                };
                reader.onerror = () => reject("Gagal membaca file");
            });
        };

        window.handleUpload = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-upload');
            const files = currentSelectedFiles;
            
            if (files.length === 0) { showToast('Pilih minimal satu foto!'); return; }

            btn.disabled = true; 
            btn.innerHTML = `<div class="flex items-center justify-center gap-3"><div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>Memproses Gambar...</div>`;
            
            try {
                const formData = new FormData(e.target);
                const imageUrls = [];
                
                for (const file of files) {
                    const compressed = await compressImage(file);
                    imageUrls.push(compressed);
                }
                
                const newReport = {
                    id: Date.now().toString(),
                    date: formData.get('date'),
                    tema: formData.get('tema'),
                    description: formData.get('description'),
                    images: imageUrls,
                    likes: 0,
                    createdAt: new Date().toISOString()
                };

                reports.unshift(newReport);
                
                if (saveData()) {
                    showToast('Berhasil diterbitkan!');
                    currentSelectedFiles = [];
                    selectedFilePreviews = [];
                    window.setTab('home');
                } else {
                    reports.shift(); 
                }
            } catch (err) {
                console.error(err);
                showToast('Gagal: Terjadi kesalahan pada gambar.');
            } finally {
                if (btn) {
                    btn.disabled = false; 
                    btn.innerText = 'Simpan Laporan';
                }
            }
        };

        window.handleLike = (id) => {
            const index = reports.findIndex(r => r.id === id);
            if (index !== -1) {
                reports[index].likes = (reports[index].likes || 0) + 1;
                saveData();
                renderApp();
            }
        };

        window.handleComment = (id) => {
            const nameInput = document.getElementById(`name-input-${id}`);
            const commentInput = document.getElementById(`comment-input-${id}`);
            const name = nameInput ? nameInput.value.trim() : myName;
            const text = commentInput.value.trim();
            if (!name) { showToast('Isi nama Anda!'); return; }
            if (!text) return;
            if (!myName) { myName = name; localStorage.setItem('al_ihsan_user_name', name); }

            comments.push({
                reportId: id, name, text, createdAt: new Date().toISOString()
            });
            saveData();
            commentInput.value = '';
            renderApp();
            showToast('Terkirim!');
        };

        window.handleDelete = (id) => { 
            const confirmBox = document.createElement('div');
            confirmBox.className = 'fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6';
            confirmBox.innerHTML = `
                <div class="bg-white p-8 rounded-[2.5rem] max-w-sm w-full shadow-2xl animate-slide-up">
                    <h3 class="text-xl font-black mb-3">Hapus Postingan?</h3>
                    <p class="text-gray-500 mb-8 text-sm">Postingan akan terhapus dari memori HP secara permanen.</p>
                    <div class="flex gap-3">
                        <button id="confirm-cancel" class="flex-1 py-4 font-bold text-gray-400">Batal</button>
                        <button id="confirm-yes" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-black">Hapus</button>
                    </div>
                </div>
            `;
            document.body.appendChild(confirmBox);
            document.getElementById('confirm-cancel').onclick = () => confirmBox.remove();
            document.getElementById('confirm-yes').onclick = () => {
                reports = reports.filter(r => r.id !== id);
                comments = comments.filter(c => c.reportId !== id);
                saveData();
                renderApp();
                confirmBox.remove();
                showToast('Terhapus');
            };
        };

        function showToast(msg) {
            const old = document.querySelector('.toast-notif');
            if (old) old.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-notif fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-3 rounded-full text-[11px] font-black shadow-2xl z-[250] animate-bounce-short border border-white/10 text-center min-w-[260px]';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 2500);
        }

        // --- Komponen UI ---
        const LOGO_URL = "https://img.sanishtech.com/u/b4b2625dd6eb1438fbc393468d2ee7bf.png";

        function Navbar() {
            return `
                <nav class="bg-white/80 backdrop-blur-2xl border-b border-gray-100 sticky top-0 z-50">
                    <div class="max-w-4xl mx-auto px-6 h-20 flex items-center justify-between">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="window.setTab('home')">
                            <div class="w-11 h-11 bg-white rounded-2xl flex items-center justify-center overflow-hidden shadow-sm border border-gray-50">
                                <img src="${LOGO_URL}" class="w-full h-full object-contain p-1.5" onerror="this.src='https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=100&h=100&fit=crop'">
                            </div>
                            <div class="flex flex-col">
                                <h1 class="font-black text-gray-900 leading-none text-lg tracking-tight shimmer-effect">Al Ihsan</h1>
                                <p class="text-[8px] text-emerald-600 font-black uppercase tracking-[0.2em] mt-1">Gusdurian Mojokerto</p>
                            </div>
                        </div>
                        <div class="flex bg-gray-100/50 p-1.5 rounded-2xl gap-1">
                            <button onclick="window.setTab('home')" class="nav-btn ${activeTab === 'home' ? 'active' : ''}"><i data-lucide="layout-grid" class="w-5 h-5"></i></button>
                            <button onclick="window.setTab('admin')" class="nav-btn ${activeTab === 'admin' ? 'active' : ''}"><i data-lucide="plus-circle" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </nav>
            `;
        }

        function ImageSlider(images, reportId) {
            if (!images || images.length === 0) return `<div class="w-full h-64 bg-gray-50 rounded-[2.5rem] flex items-center justify-center mb-6"><i data-lucide="image" class="text-gray-200 w-12 h-12"></i></div>`;
            const slides = images.map((img, idx) => `<div class="slide absolute inset-0 transition-all duration-1000 transform ${idx === 0 ? 'opacity-100 scale-100' : 'opacity-0 scale-105'}"><img src="${img}" class="w-full h-full object-cover rounded-[2.5rem]" loading="lazy"></div>`).join('');
            const dots = images.map((_, idx) => `<div class="dot h-1.5 rounded-full transition-all duration-300 ${idx === 0 ? 'w-4 bg-white' : 'w-1.5 bg-white/40'}"></div>`).join('');
            return `<div id="slider-${reportId}" class="relative w-full h-[22rem] bg-gray-100 overflow-hidden rounded-[2.5rem] mb-6 shadow-inner border border-gray-50">${slides}<div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2 z-10 bg-black/10 backdrop-blur-md p-2 rounded-full">${dots}</div><div class="absolute top-6 right-6 bg-black/40 backdrop-blur-md text-white text-[9px] px-3 py-1.5 rounded-full font-black border border-white/10 uppercase tracking-widest"><span class="slide-counter">1</span> / ${images.length}</div></div>`;
        }

        function ReportCard(report, index) {
            const reportComments = comments.filter(c => c.reportId === report.id);
            const delay = Math.min(index * 100, 800);
            return `
                <div class="report-card bg-white border border-gray-100 rounded-[3.5rem] p-7 mb-12 shadow-sm hover:shadow-2xl transition-all duration-700 animate-slide-up" style="animation-delay: ${delay}ms">
                    <div class="flex justify-between items-start mb-6 px-2">
                        <div class="flex flex-col">
                            <p class="text-[9px] font-black text-emerald-600 uppercase tracking-widest mb-1">Arsip Memori</p>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-tight">${new Date(report.date).toLocaleDateString('id-ID', { dateStyle: 'long' })}</p>
                        </div>
                        ${isAdmin ? `<button onclick="window.handleDelete('${report.id}')" class="w-10 h-10 rounded-2xl flex items-center justify-center text-red-200 hover:text-red-500 transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button>` : ''}
                    </div>

                    ${ImageSlider(report.images, report.id)}

                    <div class="px-2">
                        <div class="mb-8">
                            <h3 class="text-xl font-black text-gray-900 mb-3 leading-tight tracking-tight">${report.tema || 'Kegiatan Al Ihsan'}</h3>
                            <div class="w-10 h-1 bg-emerald-500/30 rounded-full mb-5"></div>
                            <p class="text-gray-600 leading-relaxed text-[15px] font-medium whitespace-pre-wrap">${report.description}</p>
                        </div>

                        <div class="flex items-center justify-between border-t border-gray-50 pt-6">
                            <button onclick="window.handleLike('${report.id}')" class="flex items-center gap-2 px-5 py-2.5 rounded-2xl bg-gray-50 text-gray-500 hover:bg-red-50 hover:text-red-500 transition-all active:scale-90">
                                <i data-lucide="heart" class="w-4 h-4 ${report.likes > 0 ? 'fill-red-500 text-red-500' : ''}"></i>
                                <span class="text-xs font-black">${report.likes || 0}</span>
                            </button>
                            <div class="text-[10px] font-black text-gray-300 uppercase tracking-widest">${reportComments.length} Tanggapan</div>
                        </div>

                        <div class="mt-6 space-y-3">
                            ${reportComments.map(c => `
                                <div class="bg-gray-50/50 p-4 rounded-3xl border border-gray-100/30">
                                    <p class="text-[10px] font-black text-emerald-600 uppercase mb-1">${c.name || 'Hamba Allah'}</p>
                                    <p class="text-[13px] text-gray-600 font-medium leading-relaxed">${c.text}</p>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="mt-6 bg-gray-50 rounded-[2.5rem] p-4 border border-gray-100 focus-within:ring-2 focus-within:ring-emerald-100 transition-all">
                            ${!myName ? `<input type="text" id="name-input-${report.id}" placeholder="Nama Anda..." class="w-full bg-transparent border-none px-4 py-2 text-xs font-bold focus:ring-0 mb-2 border-b border-gray-200 pb-3">` : ''}
                            <div class="flex gap-2">
                                <input type="text" id="comment-input-${report.id}" placeholder="Kirim tanggapan..." class="flex-1 bg-transparent border-none px-4 py-2 text-sm focus:ring-0">
                                <button onclick="window.handleComment('${report.id}')" class="bg-gray-900 text-white w-10 h-10 rounded-2xl flex items-center justify-center hover:bg-emerald-600 transition-all"><i data-lucide="send" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        const renderApp = () => {
            const appContainer = document.getElementById('app');
            if (!appContainer) return;
            let content = Navbar();
            
            if (activeTab === 'home') {
                const filtered = reports.filter(r => ((r.tema || "") + (r.description || "")).toLowerCase().includes(searchTerm.toLowerCase()));
                content += `
                    <div class="max-w-2xl mx-auto px-6 py-12">
                        <header class="mb-14 text-center">
                            <div class="inline-flex items-center gap-2 bg-emerald-50 text-emerald-700 text-[10px] font-black uppercase px-5 py-2 rounded-full tracking-widest mb-6">
                                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
                                Memori Perangkat
                            </div>
                            <h2 class="text-4xl font-black text-gray-900 tracking-tight leading-tight mb-8 shimmer-effect">Menciptakan Senyum<br>di Rumah Belajar</h2>
                            <div class="relative max-w-sm mx-auto">
                                <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-300 w-5 h-5"></i>
                                <input type="text" oninput="window.handleSearch(event)" placeholder="Cari kegiatan..." class="w-full bg-white border border-gray-100 rounded-full py-4 pl-14 pr-6 text-sm shadow-sm focus:ring-2 focus:ring-emerald-500 outline-none">
                            </div>
                        </header>
                        <div id="feed">${filtered.length ? filtered.map((r, i) => ReportCard(r, i)).join('') : `
                            <div class="text-center py-20 bg-white rounded-[3rem] border border-gray-100 shadow-sm">
                                <i data-lucide="inbox" class="w-12 h-12 text-gray-200 mx-auto mb-4"></i>
                                <p class="text-gray-400 font-bold text-xs uppercase tracking-widest">Belum ada data di HP ini</p>
                            </div>
                        `}</div>
                    </div>
                `;
            } else if (activeTab === 'admin') {
                if (!isAdmin) {
                    content += `
                        <div class="max-w-md mx-auto px-6 py-32 text-center">
                            <div class="bg-white rounded-[4rem] p-12 shadow-2xl border border-gray-100">
                                <div class="w-20 h-20 bg-gray-900 text-white rounded-full flex items-center justify-center mx-auto mb-10 shadow-lg"><i data-lucide="shield-check" class="w-8 h-8"></i></div>
                                <h2 class="text-2xl font-black mb-8 tracking-tight text-gray-900">Login Pengurus</h2>
                                <input type="password" id="admin-pass" placeholder="KODE" class="w-full bg-gray-50 border-none rounded-2xl p-6 mb-6 text-center text-3xl tracking-[0.4em] font-black focus:ring-2 focus:ring-gray-900 outline-none">
                                <button onclick="window.checkAdmin()" class="w-full bg-gray-900 text-white font-black py-6 rounded-3xl shadow-xl active:scale-95 transition-all">Masuk Panel</button>
                            </div>
                        </div>
                    `;
                } else {
                    content += `
                        <div class="max-w-2xl mx-auto px-6 py-12">
                            <div class="flex justify-between items-center mb-12">
                                <h2 class="text-3xl font-black text-gray-900">Panel Laporan</h2>
                                <button onclick="window.logoutAdmin()" class="bg-red-50 text-red-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Logout</button>
                            </div>
                            <div class="bg-white rounded-[4rem] p-10 shadow-xl border border-gray-50">
                                <form onsubmit="window.handleUpload(event)" class="space-y-8">
                                    <div class="bg-emerald-50/20 p-12 rounded-[3rem] border-2 border-emerald-100 border-dashed text-center group cursor-pointer hover:bg-emerald-50/40 transition-colors">
                                        <input type="file" id="photo-files" multiple accept="image/*" class="hidden" onchange="window.handleFileChange(event)">
                                        <label for="photo-files" class="cursor-pointer flex flex-col items-center">
                                            <div class="w-16 h-16 bg-white text-emerald-600 rounded-3xl flex items-center justify-center mb-4 shadow-sm group-hover:scale-110 transition-transform"><i data-lucide="camera" class="w-8 h-8"></i></div>
                                            <span class="text-sm font-black text-emerald-800 uppercase tracking-widest">${currentSelectedFiles.length > 0 ? currentSelectedFiles.length + ' Foto Terpilih' : 'Pilih Foto'}</span>
                                            <p class="text-[9px] text-gray-400 mt-2 font-bold uppercase">Maks 5 Foto - Kualitas HD Ringan</p>
                                        </label>
                                    </div>
                                    ${selectedFilePreviews.length > 0 ? `<div class="grid grid-cols-5 gap-3 p-4 bg-gray-50 rounded-3xl border border-gray-100">${selectedFilePreviews.map(url => `<div class="aspect-square rounded-xl overflow-hidden border-2 border-white shadow-sm"><img src="${url}" class="w-full h-full object-cover"></div>`).join('')}</div>` : ''}
                                    <div class="space-y-6">
                                        <div>
                                            <label class="block text-[10px] font-black uppercase text-gray-300 mb-2 ml-4 tracking-widest">Waktu Kegiatan</label>
                                            <input type="date" name="date" required class="w-full bg-gray-50 border-none rounded-2xl p-5 font-bold focus:ring-2 focus:ring-emerald-500 outline-none">
                                        </div>
                                        <div>
                                            <label class="block text-[10px] font-black uppercase text-gray-300 mb-2 ml-4 tracking-widest">Tema Utama</label>
                                            <input type="text" name="tema" required class="w-full bg-gray-50 border-none rounded-2xl p-5 font-bold focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Tema Utama Kegiatan">
                                        </div>
                                        <div>
                                            <label class="block text-[10px] font-black uppercase text-gray-300 mb-2 ml-4 tracking-widest">Detail Kisah</label>
                                            <textarea name="description" required rows="6" class="w-full bg-gray-50 border-none rounded-2xl p-5 font-medium focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Ceritakan detail kegiatannya..."></textarea>
                                        </div>
                                    </div>
                                    <button type="submit" id="btn-upload" class="w-full bg-emerald-600 text-white font-black py-7 rounded-3xl shadow-xl shadow-emerald-50 hover:bg-emerald-700 active:scale-95 transition-all uppercase tracking-widest">Simpan Laporan</button>
                                </form>
                            </div>
                        </div>
                    `;
                }
            }
            appContainer.innerHTML = content;
            lucide.createIcons();
        };

        window.onload = () => {
            setTimeout(window.hideLoader, 1500);
        };
    </script>
    <style>
        @keyframes slide-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce-short { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -10px); } }
        .animate-slide-up { animation: slide-up 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-bounce-short { animation: bounce-short 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .shimmer-effect {
            background: linear-gradient(120deg, #111827 30%, #10b981 50%, #111827 70%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer-anim 2.5s linear infinite;
        }
        @keyframes shimmer-anim {
            0% { background-position: -100% center; }
            100% { background-position: 100% center; }
        }

        body { background-color: #fafbfc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .nav-btn { padding: 12px 24px; border-radius: 18px; color: #cbd5e1; transition: all 0.4s; }
        .nav-btn.active { background-color: white; color: #10b981; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.04); }
        #loading { transition: opacity 0.5s ease; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        input, textarea { font-size: 16px !important; } 
    </style>
</head>
<body class="pb-24">
    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-[200]">
        <div class="flex flex-col items-center">
            <div class="relative w-24 h-24 flex items-center justify-center">
                <div class="absolute inset-0 border-4 border-emerald-50 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                <div class="w-12 h-12 overflow-hidden rounded-xl">
                    <img src="https://img.sanishtech.com/u/b4b2625dd6eb1438fbc393468d2ee7bf.png" class="w-full h-full object-contain">
                </div>
            </div>
            <div class="mt-8 text-center">
                <p class="text-[16px] font-black text-gray-900 uppercase tracking-[0.2em] shimmer-effect">Rumah Belajar Al Ihsan</p>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.4em] mt-2 animate-pulse">Gusdurian Mojokerto</p>
            </div>
        </div>
    </div>
    <div id="app"></div>
</body>
</html>

<script type="module">
  // 1. Import library yang dibutuhkan
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
