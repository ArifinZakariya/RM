<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Laporan - Rumah Belajar Al Ihsan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce-short { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -5px); } }
        .animate-slide-up { animation: slide-up 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-bounce-short { animation: bounce-short 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .shimmer-effect {
            background: linear-gradient(120deg, #111827 30%, #10b981 50%, #111827 70%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer-anim 3s linear infinite;
        }
        @keyframes shimmer-anim {
            0% { background-position: -100% center; }
            100% { background-position: 100% center; }
        } 

        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .nav-btn { padding: 10px 20px; border-radius: 14px; color: #94a3b8; transition: all 0.3s; }
        .nav-btn.active { background-color: white; color: #059669; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        #loading { transition: opacity 0.5s ease; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input, textarea { font-size: 16px !important; } 
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="pb-24">
    <!-- Loading Screen -->
    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-[200]">
        <div class="flex flex-col items-center">
            <div class="relative w-20 h-20 flex items-center justify-center">
                <div class="absolute inset-0 border-4 border-emerald-50 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                <div class="w-10 h-10 overflow-hidden rounded-xl">
                    <img src="https://img.sanishtech.com/u/b4b2625dd6eb1438fbc393468d2ee7bf.png" class="w-full h-full object-contain" onerror="this.src='https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=100&h=100&fit=crop'">
                </div>
            </div>
            <div class="mt-6 text-center">
                <p class="text-[14px] font-black text-gray-900 uppercase tracking-[0.2em] shimmer-effect">Rumah Belajar Al Ihsan</p>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-[0.3em] mt-2">Gusdurian Mojokerto</p>
            </div>
        </div>
    </div>

    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, deleteDoc, updateDoc, increment, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Constants & Config
        const LOGO_URL = "https://img.sanishtech.com/u/b4b2625dd6eb1438fbc393468d2ee7bf.png";
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { 
            apiKey: "AIzaSyDMvljAuezBNT0XqEYqHGyeiLFsLj2nc-g", 
            authDomain: "rumah-belajar-9d96f.firebaseapp.com", 
            projectId: "rumah-belajar-9d96f", 
            storageBucket: "rumah-belajar-9d96f.firebasestorage.app", 
            messagingSenderId: "986983944919", 
            appId: "1:986983944919:web:f9d44b3d59c8bd6348d692"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'rumah-belajar-al-ihsan';

        // State
        let isAdmin = false;
        let activeTab = 'home';
        let reports = [];
        let comments = [];
        let searchTerm = "";
        let selectedFilePreviews = [];
        let currentSelectedFiles = [];
        let myName = localStorage.getItem('al_ihsan_user_name') || "";
        let currentUser = null;
        let isLoadingData = true;

        // --- Core Functions ---

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
                hideLoader();
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                setupListeners();
            } else {
                renderApp();
            }
        });

        const hideLoader = () => {
            const loader = document.getElementById('loading');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }
        };

        const setupListeners = () => {
            if (!currentUser) return;

            // Public Collection Paths (Rule 1)
            const reportsRef = collection(db, 'artifacts', appId, 'public', 'data', 'reports');
            const commentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'comments');

            // Reports Listener
            onSnapshot(reportsRef, (snapshot) => {
                reports = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                isLoadingData = false;
                renderApp();
                hideLoader();
            }, (error) => {
                console.error("Reports Listener Error:", error);
                isLoadingData = false;
                renderApp();
                hideLoader();
            });

            // Comments Listener
            onSnapshot(commentsRef, (snapshot) => {
                comments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderApp();
            });
        };

        // UI Handlers
        window.setTab = (tab) => {
            activeTab = tab;
            selectedFilePreviews = [];
            currentSelectedFiles = [];
            renderApp();
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.handleSearch = (e) => {
            searchTerm = e.target.value.toLowerCase();
            renderApp();
        };

        window.checkAdmin = () => {
            const pass = document.getElementById('admin-pass').value;
            if (pass.toLowerCase() === 'gusdurian') {
                isAdmin = true; 
                renderApp();
            } else { 
                showToast('Kode akses salah!'); 
            }
        };

        window.logoutAdmin = () => { isAdmin = false; activeTab = 'home'; renderApp(); };

        window.handleFileChange = (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 5) {
                showToast('Maksimal 5 foto!');
                e.target.value = "";
                return;
            }
            currentSelectedFiles = files;
            selectedFilePreviews = files.map(file => URL.createObjectURL(file));
            renderApp();
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1200; 
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        };

        window.handleUpload = async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            const btn = document.getElementById('btn-upload');
            if (currentSelectedFiles.length === 0) { showToast('Pilih foto dulu!'); return; }

            btn.disabled = true;
            btn.innerHTML = `<div class="flex items-center justify-center gap-2"><div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>Mengunggah...</div>`;

            try {
                const imageUrls = [];
                for (const file of currentSelectedFiles) {
                    const base64 = await compressImage(file);
                    imageUrls.push(base64);
                }

                const formData = new FormData(e.target);
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), {
                    date: formData.get('date'),
                    tema: formData.get('tema'),
                    description: formData.get('description'),
                    images: imageUrls,
                    likes: 0,
                    createdAt: new Date().toISOString(),
                    userId: currentUser.uid
                });
                showToast('Laporan berhasil diterbitkan!');
                window.setTab('home');
            } catch (err) {
                showToast('Gagal: Ukuran data melampaui batas.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Simpan Laporan';
            }
        };

        window.handleLike = async (id) => {
            if (!currentUser) return;
            try {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'reports', id);
                await updateDoc(ref, { likes: increment(1) });
            } catch (e) {
                console.error("Like error:", e);
            }
        };

        window.handleComment = async (id) => {
            if (!currentUser) return;
            const nameInput = document.getElementById(`name-input-${id}`);
            const commentInput = document.getElementById(`comment-input-${id}`);
            const name = nameInput ? nameInput.value.trim() : myName;
            const text = commentInput.value.trim();

            if (!name || !text) {
                showToast('Lengkapi nama dan komentar');
                return;
            }
            if (!myName) { 
                myName = name; 
                localStorage.setItem('al_ihsan_user_name', name); 
            }

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'comments'), {
                    reportId: id, 
                    name, 
                    text, 
                    createdAt: new Date().toISOString(),
                    userId: currentUser.uid
                });
                commentInput.value = '';
                if (nameInput) nameInput.style.display = 'none';
            } catch (e) {
                console.error("Comment error:", e);
            }
        };

        window.handleDelete = async (id) => {
            const confirmBox = document.createElement('div');
            confirmBox.className = 'fixed inset-0 bg-black/50 backdrop-blur-sm z-[300] flex items-center justify-center p-6';
            confirmBox.innerHTML = `
                <div class="bg-white rounded-[2rem] p-8 max-w-xs w-full text-center">
                    <p class="font-bold text-gray-900 mb-6">Hapus laporan ini permanen?</p>
                    <div class="flex gap-3">
                        <button id="cancel-del" class="flex-1 py-3 rounded-xl bg-gray-100 font-bold text-gray-500">Batal</button>
                        <button id="confirm-del" class="flex-1 py-3 rounded-xl bg-red-500 font-bold text-white">Hapus</button>
                    </div>
                </div>
            `;
            document.body.appendChild(confirmBox);

            document.getElementById('cancel-del').onclick = () => confirmBox.remove();
            document.getElementById('confirm-del').onclick = async () => {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', id));
                    showToast('Laporan dihapus');
                } catch(e) {
                    showToast('Gagal menghapus');
                }
                confirmBox.remove();
            };
        };

        function showToast(msg) {
            const existing = document.querySelector('.toast-notif');
            if (existing) existing.remove();
            
            const newToast = document.createElement('div');
            newToast.className = 'toast-notif fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-[11px] font-black uppercase tracking-widest z-[250] animate-bounce-short border border-white/10 shadow-2xl';
            newToast.innerText = msg;
            document.body.appendChild(newToast);
            setTimeout(() => newToast.remove(), 2500);
        }

        // --- UI Components ---

        function Navbar() {
            return `
                <nav class="bg-white/80 backdrop-blur-xl border-b border-gray-100 sticky top-0 z-50">
                    <div class="max-w-4xl mx-auto px-6 h-20 flex items-center justify-between">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="window.setTab('home')">
                            <img src="${LOGO_URL}" class="w-9 h-9 object-contain" onerror="this.src='https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=100&h=100&fit=crop'">
                            <div class="flex flex-col">
                                <h1 class="font-black text-gray-900 leading-none text-base tracking-tight shimmer-effect">AL IHSAN</h1>
                                <p class="text-[7px] text-emerald-600 font-black uppercase tracking-widest mt-1">Gusdurian</p>
                            </div>
                        </div>
                        <div class="flex bg-gray-100 p-1.5 rounded-2xl gap-1">
                            <button onclick="window.setTab('home')" class="nav-btn ${activeTab === 'home' ? 'active' : ''}"><i data-lucide="home" class="w-5 h-5"></i></button>
                            <button onclick="window.setTab('admin')" class="nav-btn ${activeTab === 'admin' ? 'active' : ''}"><i data-lucide="plus-circle" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </nav>
            `;
        }

        function ImageSlider(images) {
            if (!images || images.length === 0) return '';
            return `
                <div class="relative w-full mb-6">
                    <div class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar gap-3 pb-2">
                        ${images.map(img => `
                            <div class="flex-none w-full h-72 snap-center">
                                <img src="${img}" class="w-full h-full object-cover rounded-[2rem] border border-gray-100 shadow-sm" loading="lazy">
                            </div>
                        `).join('')}
                    </div>
                    ${images.length > 1 ? `
                        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/30 backdrop-blur-md text-white text-[8px] px-3 py-1 rounded-full font-black uppercase tracking-widest pointer-events-none border border-white/10">
                            Geser <i data-lucide="arrow-right" class="w-2 h-2 inline ml-1"></i>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function ReportCard(report, index) {
            const rComments = comments.filter(c => c.reportId === report.id);
            return `
                <div class="bg-white border border-gray-100 rounded-[2.5rem] p-6 mb-8 shadow-sm animate-slide-up" style="animation-delay: ${index * 100}ms">
                    <div class="flex justify-between items-start mb-5">
                        <div>
                            <p class="text-[8px] font-black text-emerald-600 uppercase tracking-widest mb-0.5">Laporan Baru</p>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">${new Date(report.date).toLocaleDateString('id-ID', { dateStyle: 'long' })}</p>
                        </div>
                        ${isAdmin ? `<button onclick="window.handleDelete('${report.id}')" class="text-red-200 hover:text-red-500 transition-colors p-2"><i data-lucide="trash" class="w-4 h-4"></i></button>` : ''}
                    </div>
                    ${ImageSlider(report.images)}
                    <div class="mb-5">
                        <h3 class="text-lg font-black text-gray-900 mb-2 leading-tight">${report.tema}</h3>
                        <p class="text-gray-600 text-[13px] leading-relaxed whitespace-pre-wrap">${report.description}</p>
                    </div>
                    <div class="flex items-center justify-between border-t border-gray-50 pt-5 mb-5">
                        <button onclick="window.handleLike('${report.id}')" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-gray-50 text-gray-500 hover:text-red-500 active:scale-90 transition-all">
                            <i data-lucide="heart" class="w-4 h-4 ${report.likes > 0 ? 'fill-red-500 text-red-500' : ''}"></i>
                            <span class="text-xs font-black">${report.likes || 0}</span>
                        </button>
                        <span class="text-[9px] font-black text-gray-300 uppercase tracking-widest">${rComments.length} Komentar</span>
                    </div>
                    <div class="space-y-2 mb-5">
                        ${rComments.slice(-2).map(c => `
                            <div class="bg-gray-50/70 p-3 rounded-2xl text-[12px]">
                                <b class="text-emerald-600 block text-[9px] font-black uppercase mb-0.5">${c.name}</b>
                                <span class="text-gray-600 font-medium">${c.text}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="bg-gray-100 rounded-2xl p-3 flex gap-2 border border-transparent focus-within:border-emerald-200 focus-within:bg-white transition-all">
                        ${!myName ? `<input type="text" id="name-input-${report.id}" placeholder="Nama" class="w-16 bg-transparent border-none text-[12px] font-black focus:ring-0">` : ''}
                        <input type="text" id="comment-input-${report.id}" placeholder="Tanggapan..." class="flex-1 bg-transparent border-none text-[12px] font-medium focus:ring-0">
                        <button onclick="window.handleComment('${report.id}')" class="bg-gray-900 text-white w-8 h-8 rounded-lg flex items-center justify-center"><i data-lucide="send" class="w-3.5 h-3.5"></i></button>
                    </div>
                </div>
            `;
        }

        const renderApp = () => {
            const container = document.getElementById('app');
            if (!container) return;
            let html = Navbar();

            if (activeTab === 'home') {
                const filtered = reports.filter(r => (r.tema + r.description).toLowerCase().includes(searchTerm));
                html += `
                    <div class="max-w-xl mx-auto px-5 py-8">
                        <div class="text-center mb-10">
                            <div class="inline-flex items-center gap-2 bg-emerald-50 text-emerald-700 text-[9px] font-black uppercase px-4 py-1.5 rounded-full tracking-widest mb-4">
                                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                                Feed Terkini
                            </div>
                            <h2 class="text-3xl font-black mb-6 tracking-tight shimmer-effect leading-tight">Mewujudkan Senyum<br>Anak Bangsa</h2>
                            <div class="relative">
                                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 w-4 h-4"></i>
                                <input type="text" oninput="window.handleSearch(event)" placeholder="Cari laporan kegiatan..." class="w-full bg-white border border-gray-100 rounded-2xl py-3.5 pl-12 pr-4 text-xs shadow-sm outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                        </div>
                        ${isLoadingData ? `<div class="py-20 text-center"><div class="w-8 h-8 border-4 border-emerald-100 border-t-emerald-500 rounded-full animate-spin mx-auto mb-4"></div><p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">Sinkronisasi Cloud...</p></div>` : ''}
                        <div class="feed">${filtered.map((r, i) => ReportCard(r, i)).join('')}</div>
                        ${!isLoadingData && filtered.length === 0 ? `<div class="text-center py-20 bg-white rounded-[2rem] border border-gray-100"><i data-lucide="file-x" class="w-10 h-10 text-gray-200 mx-auto mb-3"></i><p class="text-gray-400 font-bold text-[10px] uppercase">Belum ada data</p></div>` : ''}
                    </div>
                `;
            } else {
                if (!isAdmin) {
                    html += `
                        <div class="max-w-xs mx-auto py-24 px-5">
                            <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-gray-100 text-center">
                                <div class="w-14 h-14 bg-gray-900 text-white rounded-2xl flex items-center justify-center mx-auto mb-6"><i data-lucide="lock" class="w-7 h-7"></i></div>
                                <h2 class="font-black text-xl mb-6 tracking-tight uppercase">Panel Pengurus</h2>
                                <input type="password" id="admin-pass" placeholder="KODE AKSES" class="w-full bg-gray-50 rounded-xl p-4 text-center text-xl font-black mb-4 outline-none focus:ring-2 focus:ring-emerald-500 tracking-[0.2em]">
                                <button onclick="window.checkAdmin()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-all text-xs tracking-widest">VERIFIKASI</button>
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="max-w-xl mx-auto px-5 py-8">
                            <div class="flex justify-between items-center mb-8">
                                <h2 class="text-2xl font-black tracking-tight uppercase">Upload Laporan</h2>
                                <button onclick="window.logoutAdmin()" class="text-red-500 text-[10px] font-black uppercase tracking-widest px-3 py-1 bg-red-50 rounded-lg">Keluar</button>
                            </div>
                            <form onsubmit="window.handleUpload(event)" class="bg-white p-8 rounded-[2.5rem] shadow-xl space-y-6 border border-gray-50">
                                <div class="bg-emerald-50/30 p-8 rounded-[2rem] border-2 border-dashed border-emerald-100 text-center relative">
                                    <input type="file" id="files" multiple accept="image/*" class="hidden" onchange="window.handleFileChange(event)">
                                    <label for="files" class="cursor-pointer block">
                                        <div class="w-12 h-12 bg-white text-emerald-600 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-sm"><i data-lucide="image-plus" class="w-6 h-6"></i></div>
                                        <p class="text-[11px] font-black text-emerald-800 uppercase tracking-widest">${currentSelectedFiles.length ? currentSelectedFiles.length + ' Foto Terpilih' : 'Pilih Foto Kegiatan'}</p>
                                        <p class="text-[8px] text-gray-400 mt-1 uppercase font-bold">Rasio Bebas - Maks 5 Foto</p>
                                    </label>
                                </div>
                                ${selectedFilePreviews.length ? `<div class="grid grid-cols-5 gap-2">${selectedFilePreviews.map(p => `<div class="aspect-square rounded-lg overflow-hidden border-2 border-white shadow-sm"><img src="${p}" class="w-full h-full object-cover"></div>`).join('')}</div>` : ''}
                                <div class="space-y-4">
                                    <input type="date" name="date" required class="w-full bg-gray-50 p-4 rounded-xl border-none font-bold text-xs outline-none focus:ring-2 focus:ring-emerald-500">
                                    <input type="text" name="tema" placeholder="Tema/Judul Kegiatan" required class="w-full bg-gray-50 p-4 rounded-xl border-none font-bold text-xs outline-none focus:ring-2 focus:ring-emerald-500">
                                    <textarea name="description" placeholder="Deskripsikan keseruan kegiatannya..." required rows="5" class="w-full bg-gray-50 p-4 rounded-xl border-none text-xs font-medium outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
                                </div>
                                <button type="submit" id="btn-upload" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-emerald-700 active:scale-95 transition-all uppercase tracking-widest text-[11px]">Terbitkan Laporan</button>
                            </form>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
            lucide.createIcons();
        };

        // Init
        initAuth();
    </script>
</body>
</html>
